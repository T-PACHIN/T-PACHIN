<div id="videoModal" class="video-modal"><div class="video-modal-content"><div class="video-header"><span><i class="fa fa-video-camera"></i> 遊戲錄影回放</span><span class="modal-close" onclick="closeVideoModal()">✕</span></div><video id="videoPlayer" controls autoplay></video><div class="text-center text-gray-400 text-xs py-2">🎬 從帶入代幣到帶出代幣 · 完整遊戲過程</div></div></div>

<!-- Loading 動畫 -->
<div class="hologram-loading" id="hologramLoading">
    <div class="loading-container">
        <video id="mascotVideo" class="loading-video" autoplay muted loop playsinline src="https://video.wixstatic.com/video/d5e540_d63f842135e8416f891842373bc0f582/720p/mp4/file.mp4"></video>
        <div class="loading-text-main" id="loadingMachineTitle">LOADING</div>
        <div class="progress-bar-load">
            <div class="progress-fill-load"></div>
        </div>
    </div>
</div>

<script src="shared.js"></script>
<script>
(function() {
    // ==================== 全域變數 ====================
    let userPoints = 6600;
    let betSortOrder = 'desc';
    const POINT_DIFF = 0.15;
    let currentSubData = null;
    const videoUrls = ["https://www.w3schools.com/html/mov_bbb.mp4", "https://www.w3schools.com/html/movie.mp4", "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4", "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/earth.mp4"];
    const JOKER_IMAGE_URL = "https://i.pinimg.com/736x/c3/72/db/c372db1b020ebf778ef707f63c122bf7.jpg";
    const MACHINE_NAMES = ["GOGO 小丑", "我是小丑-EX", "快樂小丑 VII", "新我是小丑-EX水晶版"];
    
    // ==================== 輔助函數 ====================
    // 格式化點數 - 支援小數後4位
    function formatPointsDecimal(value) {
        return value.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 });
    }
    function formatPointsInt(value) {
        return Math.floor(value).toLocaleString();
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = '<i class="fa fa-info-circle mr-2"></i>' + message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // 取得目前點數 (從全域儲存)
    function getCurrentPoints() {
        if (window.T_PACHIN_STORAGE) {
            return T_PACHIN_STORAGE.getPoints();
        }
        return 6600;
    }
    
    function updatePointsDisplay() {
        const points = getCurrentPoints();
        const pointsSpan = document.getElementById('userPoints');
        const confirmPoints = document.getElementById('confirmPoints');
        const remainPointsSpan = document.getElementById('remainPoints');
        if (pointsSpan) pointsSpan.innerText = formatPointsDecimal(points);
        if (confirmPoints) confirmPoints.textContent = formatPointsDecimal(points);
        if (remainPointsSpan && currentSubData) remainPointsSpan.textContent = formatPointsDecimal(points);
    }
    
    function syncPointsWithStorage() {
        if (window.T_PACHIN_STORAGE) {
            userPoints = getCurrentPoints();
            updatePointsDisplay();
        }
    }
    
    function showLoadingAndGoToSimulator(machineName, machineId, ratio, coinsAmount) {
        const machineInfo = { 
            name: machineName, 
            ratio: parseFloat(ratio), 
            machineId: machineId, 
            subName: machineId + '號機', 
            coins: coinsAmount || 100,
            pointDiff: POINT_DIFF
        };
        localStorage.setItem('t_pachin_machine_info', JSON.stringify(machineInfo));
        
        const loadingDiv = document.getElementById('hologramLoading');
        const loadingTitle = document.getElementById('loadingMachineTitle');
        
        if (loadingTitle) loadingTitle.textContent = `${machineName} NO.${machineId}`;
        
        if (loadingDiv) { 
            loadingDiv.classList.add('show'); 
            setTimeout(() => { 
                window.location.href = 'simulator.html'; 
            }, 2000); 
        } else { 
            window.location.href = 'simulator.html'; 
        }
    }
    
    // ==================== 兌換視窗邏輯 ====================
    const subConfirmModal = document.getElementById('subConfirmModal');
    const confirmTokenInput = document.getElementById('confirmTokenInput');
    const warningMsgDiv = document.getElementById('warningMsg');
    const exchangeTokensSpan = document.getElementById('exchangeTokens');
    const costPointsSpan = document.getElementById('costPoints');
    const wastePointsSpan = document.getElementById('wastePoints');
    const remainPointsSpan = document.getElementById('remainPoints');
    const confirmOkBtn = document.getElementById('confirmOk');
    
    function updateExchangeCalculation() {
        if (!currentSubData) return;
        let tokenAmount = parseInt(confirmTokenInput.value) || 0;
        if (tokenAmount < 0) tokenAmount = 0;
        let ratio = currentSubData.ratio;
        let costPointsVal = tokenAmount * ratio;
        let wastePointsVal = tokenAmount * POINT_DIFF;
        let totalCost = costPointsVal + wastePointsVal;
        let currentPoints = getCurrentPoints();
        let isValid = true;
        let warningMsg = '';
        if (tokenAmount <= 0) {
            warningMsg = '⚠️ 請輸入大於 0 的代幣數量';
            isValid = false;
        } else if (tokenAmount < 50) {
            warningMsg = '⚠️ 最低兌換 50 枚代幣，目前數量不足';
            isValid = false;
        } else if (totalCost > currentPoints) {
            warningMsg = `❌ 點數不足！需要 ${formatPointsDecimal(totalCost)} 點，目前 ${formatPointsDecimal(currentPoints)} 點`;
            isValid = false;
        }
        warningMsgDiv.innerHTML = warningMsg ? `<span class="text-error">${warningMsg}</span>` : '';
        exchangeTokensSpan.textContent = `${tokenAmount} 枚`;
        costPointsSpan.textContent = formatPointsInt(costPointsVal);
        wastePointsSpan.textContent = formatPointsInt(wastePointsVal);
        let remainAfter = currentPoints - totalCost;
        remainPointsSpan.textContent = formatPointsDecimal(remainAfter >= 0 ? remainAfter : 0);
        if (isValid) {
            confirmOkBtn.classList.remove('disabled-btn');
            confirmOkBtn.style.pointerEvents = 'auto';
            confirmOkBtn.style.opacity = '1';
        } else {
            confirmOkBtn.classList.add('disabled-btn');
            confirmOkBtn.style.pointerEvents = 'none';
            confirmOkBtn.style.opacity = '0.5';
        }
    }
    
    function doEnterGame() {
        if (!currentSubData) return;
        
        let tokenAmount = parseInt(confirmTokenInput.value) || 0;
        if (tokenAmount < 50) {
            showToast('⚠️ 最低兌換 50 枚代幣！');
            return;
        }
        
        let ratio = currentSubData.ratio;
        let totalCost = (tokenAmount * ratio) + (tokenAmount * POINT_DIFF);
        let currentPoints = getCurrentPoints();
        
        if (totalCost > currentPoints) {
            showToast('❌ 點數不足，您的點數不足');
            return;
        }
        
        // 扣除點數 (支出) - 使用全域儲存
        if (window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.updatePoints(-totalCost);
            userPoints = getCurrentPoints();
        } else {
            userPoints -= totalCost;
        }
        updatePointsDisplay();
        
        // 保存資料
        const machineName = currentSubData.machineName;
        const machineId = currentSubData.machineId;
        const machineRatio = currentSubData.ratio;
        
        // 先關閉兌換視窗
        closeSubConfirm();
        
        // 顯示 Loading 並跳轉
        showLoadingAndGoToSimulator(machineName, machineId, machineRatio, tokenAmount);
    }
    
    function closeSubConfirm() {
        if (subConfirmModal) subConfirmModal.classList.remove('show');
        currentSubData = null;
    }
    
    window.openSubConfirm = function(machineName, machineId, ratio) {
        syncPointsWithStorage();
        
        currentSubData = { 
            machineName: machineName, 
            machineId: machineId, 
            ratio: parseFloat(ratio) 
        };
        
        const confirmMachineName = document.getElementById('confirmMachineName');
        const confirmSubName = document.getElementById('confirmSubName');
        const confirmRatio = document.getElementById('confirmRatio');
        const confirmPoints = document.getElementById('confirmPoints');
        const remainPoints = document.getElementById('remainPoints');
        const currentPoints = getCurrentPoints();
        
        if (confirmMachineName) confirmMachineName.textContent = machineName;
        if (confirmSubName) confirmSubName.textContent = machineId + '號機';
        if (confirmRatio) confirmRatio.textContent = ratio;
        if (confirmPoints) confirmPoints.textContent = formatPointsDecimal(currentPoints);
        if (remainPoints) remainPoints.textContent = formatPointsDecimal(currentPoints);
        
        if (confirmTokenInput) confirmTokenInput.value = 100;
        
        updateExchangeCalculation();
        
        if (subConfirmModal) {
            subConfirmModal.classList.add('show');
        } else {
            console.error('找不到 subConfirmModal 元素');
            alert('系統錯誤：無法開啟兌換視窗');
        }
    };
    
    window.enterKeepMachine = function(machineName, machineId, ratio, savedCoins) {
        showLoadingAndGoToSimulator(machineName, machineId, ratio, savedCoins);
    };
    
    // ==================== 設定功能 ====================
    const darkModeToggle = document.getElementById('darkModeToggle');
    const body = document.body;
    function loadSettings() {
        if (window.T_PACHIN_STORAGE) {
            const settings = T_PACHIN_STORAGE.getSettings();
            if (!settings.darkMode) {
                body.classList.add('light-mode');
                if (darkModeToggle) darkModeToggle.checked = false;
            } else {
                body.classList.remove('light-mode');
                if (darkModeToggle) darkModeToggle.checked = true;
            }
            const soundToggle = document.getElementById('soundToggle');
            if (soundToggle) soundToggle.checked = settings.sound !== false;
            const notifyToggle = document.getElementById('notifyToggle');
            if (notifyToggle) notifyToggle.checked = settings.notify !== false;
            const langSelect = document.getElementById('langSelect');
            if (langSelect) langSelect.value = settings.language || 'zh-TW';
        } else {
            // Fallback to localStorage
            const darkMode = localStorage.getItem('t_pachin_dark_mode');
            if (darkMode === 'false') { body.classList.add('light-mode'); if (darkModeToggle) darkModeToggle.checked = false; }
            else { body.classList.remove('light-mode'); if (darkModeToggle) darkModeToggle.checked = true; }
            const soundEnabled = localStorage.getItem('t_pachin_sound');
            const soundToggle = document.getElementById('soundToggle');
            if (soundToggle) soundToggle.checked = soundEnabled !== 'false';
            const notifyEnabled = localStorage.getItem('t_pachin_notify');
            const notifyToggle = document.getElementById('notifyToggle');
            if (notifyToggle) notifyToggle.checked = notifyEnabled !== 'false';
            const language = localStorage.getItem('t_pachin_language') || 'zh-TW';
            const langSelect = document.getElementById('langSelect');
            if (langSelect) langSelect.value = language;
        }
    }
    function saveDarkMode(enabled) { 
        if (window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.updateSetting('darkMode', enabled);
        } else {
            if (enabled) { body.classList.remove('light-mode'); localStorage.setItem('t_pachin_dark_mode', 'true'); } 
            else { body.classList.add('light-mode'); localStorage.setItem('t_pachin_dark_mode', 'false'); }
        }
    }
    function saveSound(enabled) { 
        if (window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.updateSetting('sound', enabled);
        } else {
            localStorage.setItem('t_pachin_sound', enabled);
        }
    }
    function saveNotify(enabled) { 
        if (window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.updateSetting('notify', enabled);
        } else {
            localStorage.setItem('t_pachin_notify', enabled);
        }
    }
    function saveLanguage(lang) { 
        if (window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.updateSetting('language', lang);
        } else {
            localStorage.setItem('t_pachin_language', lang);
        }
        const langNames = { 'zh-TW': '繁體中文', 'zh-CN': '简体中文', 'en': 'English', 'ja': '日本語', 'ko': '한국어' }; 
        showToast(`🌐 語言已切換為 ${langNames[lang] || lang}`); 
    }
    if (darkModeToggle) darkModeToggle.addEventListener('change', function() { saveDarkMode(this.checked); });
    const soundToggle = document.getElementById('soundToggle');
    if (soundToggle) soundToggle.addEventListener('change', function() { saveSound(this.checked); });
    const notifyToggle = document.getElementById('notifyToggle');
    if (notifyToggle) notifyToggle.addEventListener('change', function() { saveNotify(this.checked); });
    const langSelect = document.getElementById('langSelect');
    if (langSelect) langSelect.addEventListener('change', function() { saveLanguage(this.value); });
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    if (settingsBtn) settingsBtn.addEventListener('click', () => { loadSettings(); settingsModal.classList.add('show'); });
    if (closeSettingsBtn) closeSettingsBtn.addEventListener('click', () => { settingsModal.classList.remove('show'); });
    if (settingsModal) settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.remove('show'); });
    
    // VIP 經驗值
    let currentVipLevel = 1, currentExp = 680;
    const vipExpNeeded = { 1: 1200, 2: 2500, 3: 5000, 4: 10000, 5: 20000 };
    function updateVipProgress() {
        const needed = vipExpNeeded[currentVipLevel] || 1200;
        const percent = Math.min(100, Math.floor((currentExp / needed) * 100));
        const progressFill = document.querySelector('.progress-fill');
        const vipBadge = document.getElementById('vipBadge');
        const expText = document.getElementById('expText');
        if (progressFill) progressFill.style.width = percent + '%';
        if (vipBadge) vipBadge.textContent = 'VIP ' + currentVipLevel;
        if (expText) expText.textContent = '經驗值 ' + currentExp + '/' + needed;
    }
    function showVipInfo() { const needed = vipExpNeeded[currentVipLevel] || 1200; const remaining = needed - currentExp; alert('🎖️ VIP ' + currentVipLevel + ' 特權\n\n• 返水 ' + (currentVipLevel * 0.2).toFixed(1) + '%\n• 每日免費 ' + (currentVipLevel * 10) + ' 枚代幣\n• 專屬客服通道\n\n📊 升級進度\n目前 ' + currentExp + ' / ' + needed + '\n距離下一級還需 ' + remaining + ' 經驗'); }
    function showExpInfo() { const needed = vipExpNeeded[currentVipLevel] || 1200; const remaining = needed - currentExp; alert('📊 經驗值詳解\n\n目前：' + currentExp + ' / ' + needed + '\n距離下一級：' + remaining + ' 經驗\n\n✨ 獲得經驗方式：\n• 每遊玩 1 轉 = +1 經驗\n• 每日登入 = +50 經驗\n• 活動任務 = 額外加成'); }
    
    function initNavigation() {
        document.querySelectorAll('.nav-item, .home-icon-btn, [data-page]').forEach(el => {
            if (el.classList && (el.classList.contains('nav-item') || el.classList.contains('home-icon-btn') || el.hasAttribute('data-page'))) {
                if (el._navHandler) return;
                el._navHandler = function(e) {
                    e.preventDefault();
                    const page = this.dataset.page;
                    if (page === 'index') window.location.href = 'index.html';
                    else if (page === 'machines') window.location.href = 'machines.html';
                    else if (page === 'lobby') window.location.href = 'index.html';
                    else if (page === 'news') window.location.href = 'news.html';
                    else if (page === 'about') window.location.href = 'about.html';
                };
                el.addEventListener('click', el._navHandler);
            }
        });
    }
    
    let favoriteMachines = [], keepMachines = [];
    function initFavoriteAndReserve() {
        if (window.T_PACHIN_STORAGE) {
            favoriteMachines = T_PACHIN_STORAGE.getFavorites();
            keepMachines = T_PACHIN_STORAGE.getReserves();
        } else {
            favoriteMachines = [
                { id: 1, name: 'GOGO 小丑', number: 'J001', image: JOKER_IMAGE_URL, ratio: '2.5', spread: 0.15 },
                { id: 2, name: '我是小丑-EX', number: 'J002', image: JOKER_IMAGE_URL, ratio: '2.8', spread: 0.15 }
            ];
            keepMachines = [
                { id: 4, name: '新我是小丑-EX水晶版', number: 'J004', image: JOKER_IMAGE_URL, ratio: '3.0', spread: 0.15, savedCoins: 250 }
            ];
        }
        updateBadges();
    }
    function updateBadges() { 
        const favCountSpan = document.getElementById('favCount');
        const keepCountSpan = document.getElementById('keepCount');
        if (favCountSpan) favCountSpan.innerText = favoriteMachines.length;
        if (keepCountSpan) keepCountSpan.innerText = keepMachines.length;
    }
    
    window.removeFromFavorite = function(machineId) {
        if (window.T_PACHIN_STORAGE) {
            const favorites = T_PACHIN_STORAGE.getFavorites();
            const newFavorites = favorites.filter(m => m.id !== machineId);
            T_PACHIN_STORAGE.saveFavorites(newFavorites);
            favoriteMachines = newFavorites;
        } else {
            favoriteMachines = favoriteMachines.filter(m => m.id !== machineId);
        }
        updateBadges();
        renderFavoriteModal();
        showToast('已取消收藏');
    };
    
    window.removeFromKeep = function(machineId) {
        if (window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.removeReserve(machineId);
            keepMachines = T_PACHIN_STORAGE.getReserves();
        } else {
            keepMachines = keepMachines.filter(m => m.id !== machineId);
        }
        updateBadges();
        renderKeepModal();
        showToast('已取消保留');
    };
    
    function renderFavoriteModal() {
        let html = '';
        if (favoriteMachines.length === 0) {
            html = '<div class="empty-state"><i class="fa fa-heart-o"></i><p>暫無收藏機台</p><p class="hint">可至機台頁面點擊收藏您喜愛的機台</p></div>';
        } else {
            favoriteMachines.forEach((m, idx) => { 
                const lastPlay = '2026/03/' + (10 + idx) + ' 14:30'; 
                const hotText = idx === 0 ? '<span class="hot-badge">熱門</span>' : ''; 
                const machineImage = m.image || JOKER_IMAGE_URL; 
                const spreadValue = (m.spread !== undefined) ? m.spread : 0.15; 
                html += '<div class="machine-card"><img src="' + machineImage + '" alt="小丑機台" onerror="this.src=\'https://i.pravatar.cc/150?img=13\'"><div class="machine-info"><div class="machine-name">' + m.name + ' ' + hotText + '</div><div class="machine-stats"><span>' + (m.number || 'J' + m.id) + '</span><span>每枚 ' + (m.ratio || '2.5') + '</span><span>點差 ' + spreadValue.toFixed(2) + '</span><span>上次 ' + lastPlay + '</span><span>天井 1280</span></div><div class="action-buttons"><div class="play-btn" onclick="window.openSubConfirm(\'' + m.name.replace(/'/g, "\\'") + '\', ' + m.id + ', \'' + (m.ratio || 2.5) + '\')">進入遊戲</div><div class="cancel-btn" onclick="window.removeFromFavorite(' + m.id + ')">取消收藏</div></div></div></div>'; 
            });
        }
        const favoriteModalBody = document.getElementById('favoriteModalBody');
        const favoriteModal = document.getElementById('favoriteModal');
        if (favoriteModalBody) favoriteModalBody.innerHTML = html;
        if (favoriteModal) favoriteModal.classList.add('active');
    }
    
    function renderKeepModal() {
        let html = '';
        if (keepMachines.length === 0) {
            html = '<div class="empty-state"><i class="fa fa-bookmark-o"></i><p>暫無保留機台</p><p class="hint">可至機台頁面點擊保留，下次快速進入</p></div>';
        } else {
            keepMachines.forEach((m, idx) => { 
                const lastPlay = '2026/03/' + (15 + idx) + ' 20:15'; 
                const saveNote = idx === 0 ? '最愛玩這台' : '試試手氣'; 
                const machineImage = m.image || JOKER_IMAGE_URL; 
                const spreadValue = (m.spread !== undefined) ? m.spread : 0.15;
                const savedCoins = m.savedCoins || 100;
                html += '<div class="machine-card"><img src="' + machineImage + '" alt="小丑保留機台" onerror="this.src=\'https://i.pravatar.cc/150?img=13\'"><div class="machine-info"><div class="machine-name">' + m.name + '</div><div class="machine-stats"><span>' + (m.number || 'J' + m.id) + '</span><span>每枚 ' + (m.ratio || '2.5') + '</span><span>點差 ' + spreadValue.toFixed(2) + '</span><span>保留代幣 ' + savedCoins + ' 枚</span><span>上次 ' + lastPlay + '</span><span>' + saveNote + '</span><span>天井 980</span></div><div class="action-buttons"><div class="play-btn" onclick="window.enterKeepMachine(\'' + m.name.replace(/'/g, "\\'") + '\', ' + m.id + ', \'' + (m.ratio || 2.5) + '\', ' + savedCoins + ')">進入遊戲</div><div class="cancel-btn" onclick="window.removeFromKeep(' + m.id + ')">取消保留</div></div></div></div>'; 
            });
        }
        const keepModalBody = document.getElementById('keepModalBody');
        const keepModal = document.getElementById('keepModal');
        if (keepModalBody) keepModalBody.innerHTML = html;
        if (keepModal) keepModal.classList.add('active');

    // ==================== 模擬資料產生函數 ====================
    function generateSessions() { 
        const machines = [{ name: 'GOGO 小丑', number: 'J001' }, { name: '我是小丑-EX', number: 'J002' }, { name: '快樂小丑 VII', number: 'J003' }, { name: '新我是小丑-EX水晶版', number: 'J004' }]; 
        const sessions = []; 
        for (let i = 0; i < machines.length; i++) { 
            const m = machines[i]; 
            const day = 5 + i * 6; 
            const bringInTime = new Date(2026, 2, day, 14, 30); 
            const bringOutTime = new Date(2026, 2, day, 15, 45); 
            const bringInAmount = 500 + i * 150; 
            const details = []; 
            details.push({ date: new Date(bringInTime), type: 'BRING_IN', bet: 0, win: bringInAmount, total: bringInAmount, betId: 'IN' + (i+1) }); 
            let currentTotal = bringInAmount; 
            let totalBet = 0, totalWin = 0; 
            const spinCount = 10 + Math.floor(Math.random() * 10); 
            for (let s = 0; s < spinCount; s++) { 
                const spinTime = new Date(bringInTime.getTime() + (s + 1) * 75000); 
                const bet = 6 + Math.floor(Math.random() * 14); 
                const win = Math.random() < 0.42 ? bet * (1 + Math.floor(Math.random() * 3)) : 0; 
                currentTotal = currentTotal - bet + win; 
                totalBet += bet; 
                totalWin += win; 
                details.push({ date: spinTime, type: 'SPIN', bet: bet, win: win, total: currentTotal, betId: 'SP' + (i+1) + '-' + (s+1), isFirstSpin: (s === 0) }); 
            } 
            const bringOutAmount = Math.max(100, currentTotal - Math.random() * 280); 
            details.push({ date: new Date(bringOutTime), type: 'BRING_OUT', bet: 0, win: 0, total: bringOutAmount, betId: 'OUT' + (i+1) }); 
            sessions.push({ machineName: m.name, machineNumber: m.number, bringInTime, bringOutTime, bringInAmount, bringOutAmount: Math.floor(bringOutAmount), netProfit: Math.floor(bringOutAmount - bringInAmount), details, stats: { totalSpins: spinCount, totalBet, totalWin }, videoUrl: videoUrls[i % videoUrls.length] }); 
        } 
        return sessions; 
    }
    
    // 產生交易記錄
    function generateTransactions() { 
        const txs = []; 
        let idCounter = 1;
        
        // 人工開點 (無平台)
        for (let i = 0; i < 5; i++) { 
            let day = 5 + Math.floor(Math.random() * 25);

                type: 'platform_add', 
                name: '人工開點', 
                icon: 'fa-user-plus', 
                platform: null,

                isOut: false, 
                unit: '點', 
                hasPlatform: false,
                date: date 
            }); 
        }
        
        // 人工洗點 (無平台)
        for (let i = 0; i < 5; i++) {

            let points = Math.floor(Math.random() * 3000) + 100; 
            txs.push({

        // 購買代幣（用點數購買代幣 => 點數支出，綠色 -）
        for (let i = 0; i < 4; i++) {
            let day = 8 + Math.floor(Math.random() * 22);
            let date = new Date(2026, 2, day, Math.floor(Math.random() * 24), Math.floor(Math.random() * 60));
            let coinsAmount = [100, 200, 300, 500, 1000][Math.floor(Math.random() * 5)];
            let ratio = [2.5, 2.8, 3.0][Math.floor(Math.random() * 3)];

            let costPoints = coinsAmount * ratio;
            let wastePoints = coinsAmount * pointDiff;
            let totalPointsCost = Math.floor(costPoints + wastePoints);

                unit: '點',
                detailInfo: {
                    coins: coinsAmount,
                    ratio: ratio,
                    pointDiff: pointDiff,
                    costPoints: costPoints,
                    wastePoints: wastePoints
                },
                hasPlatform: false,
                date: date
            });
        }
        
        // 兌換點數（用代幣兌換點數 => 點數收入，紅色 +）
        for (let i = 0; i < 3; i++) {
            let day = 10 + Math.floor(Math.random() * 20);
            let date = new Date(2026, 2, day, Math.floor(Math.random() * 24), Math.floor(Math.random() * 60));
            let coinsAmount = [50, 100, 200, 500][Math.floor(Math.random() * 4)];
            let ratio = [2.5, 2.8, 3.0][Math.floor(Math.random() * 3)];
            let earnedPoints = Math.floor(coinsAmount * ratio);
            let machineName = MACHINE_NAMES[Math.floor(Math.random() * MACHINE_NAMES.length)];
            let machineId = Math.floor(Math.random() * 5) + 1;
            
            txs.push({
                id: 'token_out_' + idCounter++,
                type: 'token_out',
                name: '兌換點數',
                icon: 'fa-arrow-up',
                platform: null,
                machineName: machineName,
                machineId: machineId,
                points: earnedPoints,
                isOut: false,
                unit: '點',
                detailInfo: {
                    coins: coinsAmount,
                    ratio: ratio,
                    earnedPoints: earnedPoints
                },
                hasPlatform: false,
                date: date
            });
        }
        
        // 活動贈分
        for (let i = 0; i < 3; i++) {
            let day = 5 + Math.floor(Math.random() * 25);
            let date = new Date(2026, 2, day, Math.floor(Math.random() * 24), Math.floor(Math.random() * 60));
            let points = Math.floor(Math.random() * 800) + 50;
            txs.push({
                id: 'bonus_' + idCounter++,
                type: 'bonus',
                name: '活動贈分',
                icon: 'fa-gift',
                platform: '活動中心',
                machineName: null,
                points: points,
                isOut: false,
                unit: '點',
                hasPlatform: true,
                date: date
            });
        }
        
        // 購買道具
        for (let i = 0; i < 3; i++) {
            let day = 5 + Math.floor(Math.random() * 25);
            let date = new Date(2026, 2, day, Math.floor(Math.random() * 24), Math.floor(Math.random() * 60));
            let points = Math.floor(Math.random() * 500) + 50;
            txs.push({
                id: 'shop_' + idCounter++,
                type: 'shop',
                name: '購買道具',
                icon: 'fa-shopping-cart',
                platform: '商城',
                machineName: null,
                points: points,
                isOut: true,
                unit: '點',
                hasPlatform: true,
                date: date
            });
        }
        
        return txs.sort((a, b) => b.date - a.date); 
    }
    
    let allSessions = generateSessions();
    let allTransactions = generateTransactions();
    let currentSession = null;
    let dateStart = new Date('2026-03-01'), dateEnd = new Date('2026-03-31');
    dateEnd.setHours(23, 59, 59, 999);
    let searchTerm = '';
    let currentFilter = 'all';
    
    function formatDateTime(d) { return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
    function formatDate(d) { return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0'); }
    function formatTime(d) { return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
    function getFilteredSessions() { let f = allSessions.filter(s => s.bringInTime >= dateStart && s.bringInTime <= dateEnd); if (searchTerm) f = f.filter(s => s.machineName.toLowerCase().includes(searchTerm) || s.machineNumber.toLowerCase().includes(searchTerm)); return f; }
    function getFilteredTransactions() { let f = allTransactions.filter(t => t.date >= dateStart && t.date <= dateEnd); if (currentFilter !== 'all' && currentFilter !== 'bet_detail') f = f.filter(t => t.type === currentFilter); if (searchTerm && currentFilter !== 'bet_detail') f = f.filter(t => t.name.toLowerCase().includes(searchTerm) || (t.machineName && t.machineName.toLowerCase().includes(searchTerm))); return f; }
    function getPointStatsLabels() { if (currentFilter === 'all') return { inLabel: '總轉入', outLabel: '總轉出', hasOut: true }; return { inLabel: '總存入', outLabel: '總提出', hasOut: true }; }
    function render() { if (currentFilter === 'bet_detail') { document.getElementById('transactionContainer').style.display = 'none'; document.getElementById('sessionsContainer').style.display = 'block'; renderSessions(); } else { document.getElementById('transactionContainer').style.display = 'block'; document.getElementById('sessionsContainer').style.display = 'none'; renderTransactions(); } }
    
    function renderSessions() { 
        let f = getFilteredSessions();

        let totalWin = f.reduce((a, b) => a + b.stats.totalWin, 0);

        }); 
        if (sessionsContainer) sessionsContainer.innerHTML = html;

    // 顯示交易卡片
    function renderTransactions() { 
        let f = getFilteredTransactions(); 
        let pointIn = f.filter(t => !t.isOut && t.unit === '點').reduce((a, b) => a + b.points, 0); 
        let pointOut = f.filter(t => t.isOut && t.unit === '點').reduce((a, b) => a + b.points, 0); 
        let pointNet = pointIn - pointOut; 
        let labels = getPointStatsLabels(); 
        let pointStatsHtml = '<div class="stats-row-compact"><div class="stats-item"><div class="stats-item-label">' + labels.inLabel + '</div><div class="stats-item-value in">+' + pointIn.toLocaleString() + '</div></div><div class="stats-item"><div class="stats-item-label">' + labels.outLabel + '</div><div class="stats-item-value out">-' + pointOut.toLocaleString() + '</div></div><div class="stats-item"><div class="stats-item-label">淨變化</div><div class="stats-item-value net ' + (pointNet >= 0 ? 'positive' : 'negative') + '">' + (pointNet >= 0 ? '+' : '') + pointNet.toLocaleString() + '</div></div></div>'; 
        const statsContainer = document.getElementById('statsContainer');
        const transactionContainer = document.getElementById('transactionContainer');
        if (statsContainer) {
            statsContainer.innerHTML = '<div class="stats-card-compact"><div class="stats-group"><div class="stats-group-title"><i class="fa fa-credit-card"></i> 💰 點數統計</div>' + pointStatsHtml + '</div></div>'; 
        }
        if (f.length === 0) { 
            if (transactionContainer) transactionContainer.innerHTML = '<div class="text-center text-gray-400 py-8">沒有交易記錄</div>'; 
            return; 
        } 
        let html = ''; 
        f.forEach((tx) => { 
            let isOut = tx.isOut; 
            let symbol = isOut ? '-' : '+'; 
            let colorClass = isOut ? 'out' : 'in';
            let infoHtml = '';
            if (tx.hasPlatform && tx.platform) {
                infoHtml = '<div class="tx-platform">' + tx.platform + '</div>';
            } else if (!tx.hasPlatform && tx.machineName) {
                infoHtml = '<div class="tx-machine-name">🎰 ' + tx.machineName + (tx.machineId ? ' ' + tx.machineId + '號機' : '') + '</div>';
            }
            
            html += '<div class="tx-card" onclick="showTxDetail(\'' + tx.id + '\')">' + 
                '<div class="tx-name">' + tx.name + '</div>' + infoHtml + 
                '<div class="tx-points ' + colorClass + '">' + symbol + tx.points + ' ' + tx.unit + '</div>' + 
                '<div class="tx-date">' + formatDateTime(tx.date) + '</div></div>'; 
        }); 
        if (transactionContainer) transactionContainer.innerHTML = html; 
    }

    function renderBetModalTable() { 
        if (!currentSession) return; 
        let details = [...currentSession.details].sort((a, b) => betSortOrder === 'desc' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date)); 
        let rows = ''; 
        let bringInAmount = currentSession.bringInAmount; 
        details.forEach(d => { 
            let typeLabel = '', typeClass = ''; 
            if (d.type === 'BRING_IN') { typeLabel = '帶入'; typeClass = 'type-bringin'; }

            let betDisplay = d.type === 'SPIN' ? '-' + d.bet : '-'; 
            let winDisplay = d.type === 'SPIN' ? (d.win > 0 ? '+' + d.win : '-') : '-';

    const supportBtn = document.getElementById('supportBtn');
    const dateSearchBtn = document.getElementById('dateSearchBtn');
    const searchInput = document.getElementById('searchInput');
    const filterSelect = document.getElementById('filterSelect');
    const avatarContainer = document.getElementById('avatarContainer');
    const displayNickname = document.getElementById('displayNickname');
    const headerPoints = document.getElementById('headerPoints');
    const vipBadge = document.getElementById('vipBadge');
    const expText = document.getElementById('expText');
    
    if (favMachinesBtn) favMachinesBtn.onclick = () => renderFavoriteModal();
    if (keepMachinesBtn) keepMachinesBtn.onclick = () => renderKeepModal();
    if (supportBtn) supportBtn.onclick = () => alert('客服專線: 0800-666-888');
    if (dateSearchBtn) dateSearchBtn.onclick = () => { let s = document.getElementById('startDate').value, e = document.getElementById('endDate').value; dateStart = new Date(s); dateStart.setHours(0,0,0,0); dateEnd = new Date(e); dateEnd.setHours(23,59,59,999); render(); };
    if (searchInput) searchInput.addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); render(); });
    if (filterSelect) filterSelect.addEventListener('change', (e) => { currentFilter = e.target.value; render(); });
    if (avatarContainer) avatarContainer.onclick = () => { let av = ['https://i.pravatar.cc/150?img=7', 'https://i.pravatar.cc/150?img=5', 'https://i.pravatar.cc/150?img=9']; const avatarImage = document.getElementById('avatarImage'); if (avatarImage) avatarImage.src = av[Math.floor(Math.random() * av.length)]; alert('更換頭像'); };
    if (displayNickname) displayNickname.onclick = () => { let n = prompt('新暱稱', '郝可愛'); if (n && n.trim()) { displayNickname.innerText = n; if (window.T_PACHIN_STORAGE) window.T_PACHIN_STORAGE.setNickname(n); } };
    if (headerPoints) headerPoints.onclick = () => alert(`💰 目前點數：${formatPointsDecimal(getCurrentPoints())}`);
    if (vipBadge) vipBadge.onclick = showVipInfo;
    if (expText) expText.onclick = showExpInfo;
    
    const confirmOk = document.getElementById('confirmOk');
    const confirmCancelBtn = document.getElementById('confirmCancelBtn');
    const closeXBtn = document.getElementById('closeXBtn');
    
    if (confirmOk) confirmOk.addEventListener('click', doEnterGame);
    if (confirmCancelBtn) confirmCancelBtn.addEventListener('click', closeSubConfirm);
    if (closeXBtn) closeXBtn.addEventListener('click', closeSubConfirm);
    if (confirmTokenInput) confirmTokenInput.addEventListener('input', updateExchangeCalculation);
    
    initNavigation();
    initFavoriteAndReserve();
    syncPointsWithStorage();
    bindStorageEvents();
    updateBadges();
    updateVipProgress();
    loadSettings();
    
    const transactionContainer = document.getElementById('transactionContainer');
    const sessionsContainer = document.getElementById('sessionsContainer');
    if (transactionContainer) transactionContainer.style.display = 'block';
    if (sessionsContainer) sessionsContainer.style.display = 'none';
    render();
})();
</script>
</body>
</html>
