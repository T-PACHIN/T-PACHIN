<!DOCTYPE html>
<html lang="zh-TW">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;500;700;900&family=Noto+Sans+JP:wght@300;500;700;900&family=Russo+One&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0c1a; color: #fff; font-family: 'Noto Sans JP', 'Orbitron', sans-serif; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(74, 128, 192, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(153, 0, 255, 0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        .max-w-md { max-width: 448px; margin: 0 auto; height: 100vh; position: relative; z-index: 1; background: linear-gradient(145deg, #0f1425, #0a0e1f); box-shadow: 0 0 50px rgba(74, 128, 192, 0.2); border-left: 1px solid rgba(74, 128, 192, 0.2); border-right: 1px solid rgba(153, 0, 255, 0.2); display: flex; flex-direction: column; overflow: hidden; }
        
        /* ==================== 全域滾動條樣式 ==================== */
        ::-webkit-scrollbar { width: 4px; height: 0px; background: transparent; }
        ::-webkit-scrollbar-track { background: rgba(74, 128, 192, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(74, 128, 192, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(74, 128, 192, 0.8); }
        
        /* Firefox 全域滾動條 */
        * {
            scrollbar-width: thin;
            scrollbar-color: #4a80c0 rgba(74, 128, 192, 0.2);
        }
        
        /* 子機台列表滾動條 - 與主頁面一致 */
        .submachine-container::-webkit-scrollbar {
            width: 4px;
            height: 0px;
            background: transparent;
        }
        .submachine-container::-webkit-scrollbar-track {
            background: rgba(74, 128, 192, 0.1);
            border-radius: 10px;
        }
        .submachine-container::-webkit-scrollbar-thumb {
            background: rgba(74, 128, 192, 0.5);
            border-radius: 10px;
        }
        .submachine-container::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 128, 192, 0.8);
        }
        .submachine-container {
            scrollbar-width: thin;
            scrollbar-color: #4a80c0 rgba(74, 128, 192, 0.2);
        }
        
        .metal-header { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border-bottom: 2px solid #4a80c0; border-top: 2px solid #4a80c0; box-shadow: 0 5px 0 #0f121c, 0 10px 15px rgba(74, 128, 192, 0.3), inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 8px rgba(0,0,0,0.6); position: relative; overflow: hidden; border-radius: 0 0 30px 30px; padding: 0.75rem 1rem; flex-shrink: 0; }
        .metal-header::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: skewX(-20deg); animation: shine 4s infinite; pointer-events: none; }
        @keyframes shine { 0% { left: -100%; } 20% { left: 120%; } 100% { left: 120%; } }
        .logo { display: flex; align-items: center; gap: 8px; font-family: 'Orbitron','Russo One',sans-serif; cursor: pointer; transition: transform 0.2s ease; text-decoration: none; color: inherit; }
        .logo:active { transform: scale(0.97); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #000, #111, #222); border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(74,128,192,0.5), inset 0 0 10px rgba(255,215,0,0.2); overflow: hidden; border: 2px solid #ffd700; }
        .logo-icon::before { content: ''; position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, #4a80c0, #c90a0a, #ffd700, transparent); animation: logoRotate 4s linear infinite; }
        .logo-icon::after { content: ''; position: absolute; width: 30px; height: 30px; background: #000; border-radius: 8px; }
        @keyframes logoRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-icon-inner { position: relative; z-index: 2; font-size: 16px; font-weight: 900; background: linear-gradient(45deg, #ffdf00, #ffec8b, #4a80c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
        .logo-main { font-size: 18px; font-weight: 900; background: linear-gradient(45deg, #ffdf00, #ffd700, #4a80c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: textShine 3s ease-in-out infinite alternate; }
        .logo-sub { font-size: 9px; color: #4a80c0; font-weight: 500; letter-spacing: 0.8px; text-shadow: 0 0 4px rgba(74, 128, 192, 0.5); }
        @keyframes textShine { from { filter: brightness(1); } to { filter: brightness(1.2); text-shadow: 0 0 10px #ffd700; } }
        .nickname-link { color: #ffffff; text-shadow: 0 2px 3px black, 0 0 10px rgba(255,255,255,0.3); font-weight: 600; transition: all 0.2s ease; font-size: 1.3rem; line-height: 1.3; margin-bottom: 4px; letter-spacing: 0.5px; text-decoration: none; cursor: pointer; display: inline-block; }
        .nickname-link:hover { color: #ffd966; text-shadow: 0 0 10px #ffd700, 0 2px 3px black; }
        .points-display { background: linear-gradient(145deg, #4a3a1a, #3a2a0a); padding: 0.15rem 1.5rem; border-radius: 30px; box-shadow: inset 0 2px 5px rgba(255,215,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.6), 0 4px 0 #2a1f0a, 0 0 12px #ffd700; border: 1px solid #ffd700; color: #ffd966; font-weight: 900; font-size: 1.1rem; text-shadow: 0 2px 3px black; cursor: pointer; transition: all 0.1s ease; line-height: 1.3; min-width: 100px; text-align: center; }
        .announcement-combo { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border: 1px solid #4a80c0; border-radius: 40px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.75rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .combo-announce-btn { background: linear-gradient(145deg, #3a5065, #2a4055); border: 1px solid #4a80c0; color: white; border-radius: 30px; padding: 0.25rem 1rem; display: flex; align-items: center; gap: 0.25rem; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .combo-marquee { flex: 1; overflow: hidden; color: #b3e4ff; font-size: 0.8rem; }
        .marquee-content { display: inline-block; white-space: nowrap; animation: marqueeScroll 20s linear infinite; padding-left: 100%; }
        @keyframes marqueeScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .top-banner { width: 100%; height: 180px; background-color: #1a1f2f; border-radius: 20px; margin: 0.5rem 0; overflow: hidden; position: relative; border: 2px solid #4a80c0; }
        .banner-slider { width: 100%; height: 100%; display: flex; transition: transform 0.5s ease-in-out; }
        .banner-slider img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        .banner-dots { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 5; }
        .banner-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 1px solid #4a80c0; cursor: pointer; }
        .banner-dot.active { background: #ffd700; border-color: #ffd700; }
        .tab-container { position: relative; width: 100%; overflow: hidden; }
        .tabs-wrapper { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 0 4px; }
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; white-space: nowrap; cursor: pointer; padding: 0.5rem 1.25rem; border-radius: 30px; font-size: 0.875rem; font-weight: 700; background: linear-gradient(145deg, #3a4050, #2a2f40); border: 1px solid #4a80c0; color: #b0c4de; box-shadow: inset 0 2px 3px rgba(255,255,255,0.2), inset 0 -2px 3px rgba(0,0,0,0.3), 0 4px 0 #0f121c; transition: all 0.1s ease; }
        .tab-btn:active { transform: translateY(2px); box-shadow: inset 0 2px 3px rgba(0,0,0,0.4), 0 1px 0 #0f121c; }
        .tab-btn.tech-tab-active { background: linear-gradient(145deg, #4a5065, #3a4055); color: white; border-color: #ffd700; box-shadow: inset 0 2px 5px rgba(255,255,255,0.5), inset 0 -2px 5px rgba(0,0,0,0.4), 0 4px 0 #0f121c, 0 0 15px #4a80c0; }
        .game-card-bg { background: linear-gradient(145deg, #1a1f2f, #0f1425); border: 2px solid #4a80c0; border-radius: 24px; position: relative; overflow: hidden; transition: all 0.2s ease; box-shadow: 0 8px 0 #0f121c, inset 0 1px 2px rgba(255,255,255,0.1); cursor: pointer; }
        .game-card-bg:hover { transform: translateY(-3px); box-shadow: 0 11px 0 #0f121c, inset 0 1px 2px rgba(255,255,255,0.15); }
        .game-card-bg:active { transform: translateY(4px); box-shadow: 0 4px 0 #0f121c; }
        .game-card-bg img { width: 100%; height: 120px; object-fit: cover; border-bottom: 2px solid #4a80c0; }
        .card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; width: 100%; }
        .card-title-wrapper { flex: 1; overflow: hidden; position: relative; }
        .card-title-scroll { display: inline-block; font-size: 1rem; font-weight: 700; color: #ffd966; text-shadow: 0 1px 2px black; white-space: nowrap; will-change: transform; }
        .card-title-wrapper.scrollable { overflow: hidden; }
        .card-title-wrapper.scrollable .card-title-scroll { animation: scrollText 10s linear infinite; padding-left: 100%; }
        @keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .machine-badge { display: inline-block; padding: 4px 10px; font-size: 0.7rem; font-weight: 700; border-radius: 30px; background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border: 1px solid #4a80c0; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 2px 3px rgba(0,0,0,0.3); flex-shrink: 0; }
        .badge-4 { background: linear-gradient(145deg, #4a1a6e, #3a0a5e); border-color: #ff66ff; color: #ffccff; }
        .badge-5 { background: linear-gradient(145deg, #1a4a6e, #0a3a5e); border-color: #66ffff; color: #ccffff; }
        .badge-6 { background: linear-gradient(145deg, #6e4a1a, #5e3a0a); border-color: #ffaa66; color: #ffe6cc; }
        .vendor-info { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
        .vendor-name { background: linear-gradient(145deg, #2a3a4a, #1a2a3a); border: 1px solid #4a80c0; border-radius: 30px; padding: 3px 12px; font-size: 0.7rem; color: #aaffff; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 2px 3px rgba(0,0,0,0.2); }
        .status-stats { display: flex; gap: 8px; }
        .stat-icon-only { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; padding: 2px 8px; border-radius: 30px; background: linear-gradient(145deg, #1a2a2a, #0a1a1a); border: 1px solid #4a80c0; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 2px 2px rgba(0,0,0,0.2); }
        .stat-icon-only i { font-size: 0.7rem; }
        .stat-icon-only .empty-count { color: #00ff00; text-shadow: 0 0 3px #00ff00; }
        .stat-icon-only .using-count { color: #ff4444; text-shadow: 0 0 3px #ff4444; }
        .popular-badge { position: absolute; top: 8px; left: 8px; background: linear-gradient(145deg, #ef4444, #dc2626); color: white; font-size: 0.7rem; font-weight: bold; padding: 2px 10px; border-radius: 30px; z-index: 10; box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.4); }
        .new-machine-badge { position: absolute; top: 6px; right: 6px; z-index: 10; width: 70px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); }
        .new-machine-badge img { width: 100%; height: auto; }
        .enter-btn { background: linear-gradient(145deg, #3a5065, #2a4055); border: 1px solid #4a80c0; color: white; font-size: 0.75rem; padding: 8px 0; border-radius: 30px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 8px; font-family: 'Orbitron', 'Noto Sans TC', sans-serif; letter-spacing: 1px; box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), inset 0 -2px 3px rgba(0,0,0,0.4), 0 5px 0 #0f121c; transition: all 0.08s linear; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .enter-btn:active { transform: translateY(3px); box-shadow: inset 0 3px 5px rgba(0,0,0,0.5), inset 0 -1px 2px rgba(255,255,255,0.2), 0 2px 0 #0f121c; }
        .category-title { color: #fff; font-weight: 700; padding: 12px 20px; background: linear-gradient(145deg, #2a2f3f, #1a1f2f); margin-bottom: 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; border-radius: 30px; border: 2px solid #4a80c0; box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 5px 0 #0f121c; }
        .vertical-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem; }
        
        /* 底部導覽列 - 完全恢復原始尺寸，並允許內容溢出 */
        .bottom-nav { 
            width: 100%; 
            max-width: 448px; 
            padding: 0.5rem 1rem; 
            background: linear-gradient(145deg, #2a2f3f, #1a1f2f); 
            border-top: 2px solid #4a80c0; 
            border-bottom: 2px solid #4a80c0; 
            border-radius: 30px 30px 30px 30px; 
            box-shadow: 0 -5px 15px rgba(74, 128, 192, 0.3), 0 8px 10px rgba(0, 0, 0, 0.6), inset 0 2px 5px rgba(255, 255, 255, 0.3), inset 0 -3px 8px rgba(0, 0, 0, 0.6); 
            position: fixed; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 50; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            overflow: visible;
        }
        .bottom-nav::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: -100%; 
            width: 50%; 
            height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); 
            transform: skewX(-20deg); 
            animation: shine 4s infinite; 
            pointer-events: none; 
        }
        
        /* 一般導航按鈕 - 完全恢復原始尺寸 */
        .nav-item { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 0.5rem 0.75rem; 
            border-radius: 20px; 
            text-decoration: none; 
            outline: none; 
            background: linear-gradient(145deg, #3a4050, #2a2f40); 
            box-shadow: 0 5px 0 #0f121c, inset 0 2px 5px rgba(255, 255, 255, 0.3), inset 0 -3px 5px rgba(0, 0, 0, 0.3); 
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(74, 128, 192, 0.2); 
            color: #b0c4de; 
            transition: all 0.1s ease; 
            font-family: 'Noto Sans TC', 'Noto Sans JP', 'Orbitron', sans-serif; 
            flex: none; 
            width: 50px; 
        }
        .nav-item i { font-size: 1.4rem; margin-bottom: 2px; filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.5)); }
        .nav-item span { font-weight: 700; letter-spacing: 0.5px; font-size: 0.7rem; }
        .nav-item:active { transform: translateY(3px); box-shadow: 0 2px 0 #0f121c, inset 0 5px 8px rgba(0, 0, 0, 0.5), inset 0 -2px 5px rgba(255, 255, 255, 0.2); color: #4a80c0; }
        .nav-item.current-page { background: linear-gradient(145deg, #4a5065, #3a4055); box-shadow: 0 5px 0 #0f121c, 0 10px 15px rgba(74, 128, 192, 0.5), inset 0 2px 8px rgba(255, 255, 255, 0.6), inset 0 -3px 8px rgba(0, 0, 0, 0.4); color: white; border: 1px solid #4a80c0; transform: scale(1.05); text-shadow: 0 0 8px #4a80c0; }
        
        /* ========= 獨特賽博龐克風格 - 霓虹紫羅蘭凸起按鈕 ========= */
        .nav-item.lobby-special {
            background: linear-gradient(145deg, #9b4dff, #6a1b9a, #4a0080);
            transform: translateY(-26px) scale(1.1);
            box-shadow: 0 10px 0 #2a004d, 
                        0 18px 25px rgba(0, 0, 0, 0.5),
                        inset 0 2px 12px rgba(255, 255, 255, 0.4), 
                        inset 0 -4px 8px rgba(0, 0, 0, 0.3),
                        0 0 20px #bf5eff,
                        0 0 8px #7c3aed;
            color: #ffffff;
            border: 1px solid #d8b4ff;
            text-shadow: 0 0 8px #bf5eff;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 60;
            padding: 0.5rem 0.7rem;
            width: 54px;
        }
        .nav-item.lobby-special i {
            font-size: 1.7rem;
            margin-bottom: 3px;
            text-shadow: 0 2px 0 #2a004d, 0 0 12px #d8b4ff;
            filter: drop-shadow(0 0 4px #bf5eff);
        }
        .nav-item.lobby-special span {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 1px 0 #2a004d, 0 0 10px #bf5eff;
        }
        @keyframes neonPulse {
            0% { 
                box-shadow: 0 10px 0 #2a004d, 0 18px 25px rgba(0, 0, 0, 0.5), inset 0 2px 12px rgba(255, 255, 255, 0.4), inset 0 -4px 8px rgba(0, 0, 0, 0.3), 0 0 15px #9b4dff, 0 0 5px #6a1b9a;
                background: linear-gradient(145deg, #9b4dff, #6a1b9a, #4a0080);
            }
            100% { 
                box-shadow: 0 10px 0 #2a004d, 0 20px 28px rgba(0, 0, 0, 0.55), inset 0 2px 14px rgba(255, 255, 255, 0.55), inset 0 -4px 8px rgba(0, 0, 0, 0.3), 0 0 35px #d8b4ff, 0 0 15px #bf5eff;
                background: linear-gradient(145deg, #b77dff, #8b3dff, #6a1b9a);
            }
        }
        .nav-item.lobby-special {
            animation: neonPulse 1.3s ease-in-out infinite alternate;
        }
        .nav-item.lobby-special:active {
            transform: translateY(-18px) scale(1.07);
            box-shadow: 0 6px 0 #2a004d, 0 14px 20px rgba(0, 0, 0, 0.45), inset 0 2px 10px rgba(255,255,255,0.5), 0 0 28px #bf5eff;
            animation: none;
        }
        .nav-item.lobby-special:active i {
            text-shadow: 0 1px 0 #2a004d;
        }
        .nav-item.lobby-special:active span {
            text-shadow: 0 0 6px #bf5eff;
        }
        
        .main-content { flex: 1; overflow-y: auto; padding: 0 1rem 80px 1rem; scrollbar-width: thin; scrollbar-color: #4a80c0 transparent; }
        .main-content::-webkit-scrollbar { width: 3px; }

        .main-content::-webkit-scrollbar-thumb { background: #4a80c0; border-radius: 10px; }

        .drawer-btn:active { transform: translateY(2px); box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 1px 0 #0f121c; }
        .drawer-btn.clear { background: linear-gradient(145deg, #4a2a2a, #2a1a1a); color: #ffaaaa; }

<script>
(function() {

    const subData = {
        "GOGO 小丑": { ratios:[1.0,2.0,2.5,3.0,4.0,5.0], ids:[1,2,3,4,5,6], bb:[1200,1100,1300,1250,1400,1500], rb:[600,550,650,620,700,750], curr:[180,200,210,195,220,230], total:[4200,4300,4400,4250,4600,4800], status:["occupied","using","maintenance","empty","empty","empty"], maintenanceTime:["佔用中 (您的機台)","","維護中 預計 2025/03/28 14:00 恢復","","",""] },

        "快樂小丑 VII": { ratios:[1.0,2.0,2.5,3.0,4.0,5.0], ids:[1,2,3,4,5,6], bb:[1000,1050,1100,1080,1200,1250], rb:[480,500,520,510,550,580], curr:[160,170,180,175,190,200], total:[3500,3600,3700,3550,3800,4000], status:["empty","using","occupied","maintenance","empty","empty"], maintenanceTime:["","","佔用中 (您的機台)","維護中 預計 2025/03/30 09:00 恢復","",""] },
        "小丑狂歡夜": { ratios:[1.0,2.0,2.5,3.0,4.0,5.0], ids:[1,2,3,4,5,6], bb:[900,950,1000,980,1050,1100], rb:[450,470,490,480,500,520], curr:[140,150,160,155,170,180], total:[3200,3300,3400,3350,3600,3800], status:["empty","empty","empty","empty","empty","empty"], maintenanceTime:["","","","","",""] }

    function updatePointsDisplay() { document.getElementById('tokenBtn').textContent = userPoints.toLocaleString(); if(document.getElementById('confirmPoints')) document.getElementById('confirmPoints').textContent = userPoints.toLocaleString(); if(document.getElementById('confirmTokenRemain')) document.getElementById('confirmTokenRemain').innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${userPoints.toLocaleString()}`; }

    function showToast(message) { const toast = document.createElement('div'); toast.className = 'toast-message'; toast.innerHTML = `<i class="fa fa-info-circle mr-2"></i>${message}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
    function getMachineStats(machineName) { let data = subData[machineName]; if(!data) return { empty: 0, using: 0 }; let empty = 0, using = 0; data.status.forEach(s => { if(s === 'empty') empty++; else if(s === 'using') using++; }); return { empty, using }; }
    function generateMiniCards(data, idx) { const values = [ Math.floor(data.bb[idx]/4), Math.floor(data.bb[idx]/3.5), Math.floor(data.bb[idx]/3), Math.floor(data.rb[idx]/2.5), Math.floor(data.rb[idx]/2), Math.floor(data.rb[idx]/1.8), data.curr[idx], Math.floor(data.total[idx]/5) ]; let cardsHtml = ''; for (let i = 0; i < 8; i++) { let fillCount = values[i] > 400 ? 5 : values[i] > 300 ? 4 : values[i] > 200 ? 3 : values[i] > 100 ? 2 : 1; let colorClass = (i < 3) ? 'filled-red' : 'filled-green'; let barsHtml = ''; for (let s = 0; s < 5; s++) barsHtml += `<div class="card-bar-segment ${(s < fillCount) ? colorClass : ''}"></div>`; cardsHtml += `<div class="mini-card"><div class="card-number">${i+1}</div><div class="card-bars">${barsHtml}</div><div class="card-value">${values[i].toLocaleString()}</div></div>`; } return cardsHtml; }
    function switchCardPage(card) { let p1 = card.querySelector('.page1'), p2 = card.querySelector('.page2'), d = card.querySelectorAll('.sub-dot'); if(p1.classList.contains('active')) { p1.classList.remove('active'); p2.classList.add('active'); d[0].classList.remove('active'); d[1].classList.add('active'); } else { p1.classList.add('active'); p2.classList.remove('active'); d[0].classList.add('active'); d[1].classList.remove('active'); } }
    function switchPage(dot, pageNum) { let card = dot.closest('.sub-card'), p1 = card.querySelector('.page1'), p2 = card.querySelector('.page2'), d = card.querySelectorAll('.sub-dot'); if(pageNum === 1) { p1.classList.add('active'); p2.classList.remove('active'); d[0].classList.add('active'); d[1].classList.remove('active'); } else { p1.classList.remove('active'); p2.classList.add('active'); d[0].classList.remove('active'); d[1].classList.add('active'); } }
    function switchAllPages(pageNum) { let tabs = document.querySelectorAll('.data-mini-tab'); tabs.forEach((t,i) => t.classList.toggle('active', i === pageNum-1)); document.querySelectorAll('.sub-card').forEach(card => { let p1 = card.querySelector('.page1'), p2 = card.querySelector('.page2'), d = card.querySelectorAll('.sub-dot'); if(pageNum === 1) { p1.classList.add('active'); p2.classList.remove('active'); d[0].classList.add('active'); d[1].classList.remove('active'); } else { p1.classList.remove('active'); p2.classList.add('active'); d[0].classList.remove('active'); d[1].classList.add('active'); } }); }
    function filterSubByRatio() { const subCards = document.querySelectorAll('#submachineContainer .sub-card'); if(!subCards.length) return; subCards.forEach(card => { const ratioValue = parseFloat(card.getAttribute('data-ratio-value')); if (isNaN(ratioValue)) return; let show = true; if(currentRatioFilter !== "all") show = Math.abs(ratioValue - parseFloat(currentRatioFilter)) < 0.01; card.style.display = show ? 'block' : 'none'; }); }
    
    function generateSubMachines(machineName) { let data = subData[machineName]; if(!data) return; let container = document.getElementById('submachineContainer'); if(!container) return; let subItems = []; for(let i = 0; i < data.ids.length; i++) { let status = data.status[i]; let weight = status === 'empty' ? 1 : status === 'occupied' ? 2 : status === 'using' ? 3 : 4; subItems.push({ idx: i, weight: weight, status: status }); } subItems.sort((a,b) => a.weight - b.weight); const uniqueRatios = [...new Set(data.ratios.map(r => r.toString()))]; uniqueRatios.sort((a,b) => parseFloat(a)-parseFloat(b)); let ratioOptions = '<option value="all">全部倍率</option>'; uniqueRatios.forEach(ratio => { ratioOptions += `<option value="${ratio}">${ratio}</option>`; }); let html = `<div class="data-mini-tabs"><div class="tabs-left"><div class="data-mini-tab active" onclick="window.switchAllPages(1)">數據1</div><div class="data-mini-tab" onclick="window.switchAllPages(2)">數據2</div></div><select id="subRatioSelect" class="ratio-select-mini" onchange="window.currentRatioFilter=this.value; window.filterSubByRatio();">${ratioOptions}</select></div><div class="submachine-container" id="submachineList">`; for(let item of subItems) { let i = item.idx; let status = data.status[i]; let isMaint = status === 'maintenance', isUsing = status === 'using', isOccupied = status === 'occupied'; let statusClass = '', statusBadge = ''; if(isOccupied) { statusClass = 'occupied-card'; statusBadge = '<span class="occupied-badge-small"><i class="fa fa-user"></i> 佔用中</span>'; } else if(isUsing) { statusClass = 'using-card'; statusBadge = '<span class="using-badge-small"><i class="fa fa-bolt"></i> 使用中</span>'; } else if(isMaint) { statusClass = 'maintenance-card'; statusBadge = '<span class="maintenance-badge-small"><i class="fa fa-wrench"></i> 維護中</span>'; } else { statusBadge = '<span class="empty-badge-small"><i class="fa fa-circle-o"></i> 空檯</span>'; } let maintTimeHtml = (isMaint && data.maintenanceTime[i]) ? `<div class="maintenance-time"><i class="fa fa-calendar"></i> ${data.maintenanceTime[i]}</div>` : ''; let miniCardsHtml = generateMiniCards(data, i); let canEnter = (status === 'empty' || status === 'occupied'); let btnText = isUsing ? '🔴 使用中' : isMaint ? '🔧 維護中' : isOccupied ? '🎮 進入遊戲' : '進入遊戲'; let occupiedKey = `${machineName}_${data.ids[i]}`; let isUserOccupied = (status === 'occupied' && currentOccupiedTokens[occupiedKey]); let leaveBtnHtml = (isOccupied && isUserOccupied) ? `<div class="leave-small" onclick="event.stopPropagation(); window.openSettlementModal('${machineName}','${data.ids[i]}號機',${data.ids[i]}, ${data.ratios[i]})"><i class="fa fa-sign-out"></i> 離座</div>` : ''; let ratioValue = data.ratios[i]; html += `<div class="sub-card ${statusClass}" onclick="window.switchCardPage(this)" data-ratio-value="${ratioValue}"><div class="sub-title-row"><span class="sub-machine-name">${machineName} ${data.ids[i]}號機 ${statusBadge}</span><div class="rate-info-group"><span class="sub-ratio-badge"><i class="fa fa-ticket"></i> 每枚 ${ratioValue}</span><span class="point-value-badge"><i class="fa fa-exchange"></i> 得點 0.9</span></div></div>${maintTimeHtml}<div class="sub-page page1 active"><div class="stats-grid"><div class="stat-cell"><div class="stat-label">BIG BONUS</div><div class="stat-number bb-number">${data.bb[i].toLocaleString()}</div></div><div class="stat-cell"><div class="stat-label">REG BONUS</div><div class="stat-number rb-number">${data.rb[i].toLocaleString()}</div></div><div class="stat-cell"><div class="stat-label">目前累積</div><div class="stat-number curr-number">${data.curr[i].toLocaleString()}</div></div><div class="stat-cell"><div class="stat-label">總計</div><div class="stat-number total-number">${data.total[i].toLocaleString()}</div></div></div></div><div class="sub-page page2"><div class="mini-cards-row">${miniCardsHtml}</div></div><div class="sub-page-indicator"><span class="sub-dot active" onclick="event.stopPropagation(); window.switchPage(this,1)"></span><span class="sub-dot" onclick="event.stopPropagation(); window.switchPage(this,2)"></span></div><div class="sub-card-actions"><div class="enter-small ${!canEnter ? 'disabled' : ''}" onclick="event.stopPropagation(); ${canEnter ? `window.openSubConfirm('${machineName}','${data.ids[i]}號機','${ratioValue}',${data.ids[i]})` : `alert('此機台${isUsing?'使用中':isMaint?'維護中':''}，無法進入！');`}">${btnText}</div>${leaveBtnHtml}<div class="favorite-small" onclick="event.stopPropagation(); window.toggleFavorite('${machineName}', ${data.ids[i]}, '${ratioValue}')"><i class="fa fa-heart-o"></i></div></div></div>`; } html += `</div>`; container.innerHTML = html; const ratioSelect = document.getElementById('subRatioSelect'); if(ratioSelect) ratioSelect.onchange = function() { currentRatioFilter = this.value; filterSubByRatio(); }; filterSubByRatio(); }
    
    function toggleFavorite(machineName, machineId, ratio) { showToast(`❤️ ${machineName} ${machineId}號機 已收藏`); }

    function openSubConfirm(machineName, subName, ratioValue, machineId) { currentSubDataInfo = { machineName, subName, ratioValue: parseFloat(ratioValue), machineId: machineId }; document.getElementById('confirmMachineName').textContent = machineName; document.getElementById('confirmSubName').textContent = subName; document.getElementById('confirmRatio').textContent = ratioValue; document.getElementById('confirmPoints').textContent = userPoints; document.getElementById('confirmTokenInput').value = 1000; function updateRemain() { let val = parseInt(document.getElementById('confirmTokenInput').value) || 0; let tokens = Math.floor(val / currentSubDataInfo.ratioValue); document.getElementById('confirmTokenRemain').innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${(userPoints - val).toLocaleString()}`; document.getElementById('exchangeTokens').textContent = `${tokens.toLocaleString()} 枚`; } updateRemain(); document.getElementById('confirmTokenInput').oninput = updateRemain; document.getElementById('subConfirmModal').classList.add('show'); }
    function closeConfirmModalOnly() { document.getElementById('subConfirmModal').classList.remove('show'); currentSubDataInfo = null; }
    function doEnterGame() { if(currentSubDataInfo) { const usedPoints = parseInt(document.getElementById('confirmTokenInput').value) || 0; if(usedPoints <= 0) { showToast('請輸入大於 0 的點數'); return; } if(usedPoints < 50) { showMinPointsAlert(); return; } if(usedPoints > userPoints) { showToast('❌ 點數不足！'); return; } const exchangeTokens = Math.floor(usedPoints / currentSubDataInfo.ratioValue); updatePoints(-usedPoints); const occupiedKey = `${currentSubDataInfo.machineName}_${currentSubDataInfo.machineId}`; currentOccupiedTokens[occupiedKey] = exchangeTokens; if(subData[currentSubDataInfo.machineName] && subData[currentSubDataInfo.machineName].status[currentSubDataInfo.machineId-1]) { subData[currentSubDataInfo.machineName].status[currentSubDataInfo.machineId-1] = 'occupied'; subData[currentSubDataInfo.machineName].maintenanceTime[currentSubDataInfo.machineId-1] = '佔用中 (您的機台)'; } const machineInfo = { name: currentSubDataInfo.machineName, subName: currentSubDataInfo.subName, ratio: currentSubDataInfo.ratioValue, machineId: currentSubDataInfo.machineId, coins: exchangeTokens }; localStorage.setItem('t_pachin_machine_info', JSON.stringify(machineInfo)); const video = document.getElementById('mascotVideo'); if(video) video.play().catch(e=>{}); document.getElementById('hologramLoading').classList.add('show'); setTimeout(() => { document.getElementById('subConfirmModal').classList.remove('show'); document.getElementById('hologramLoading').classList.remove('show'); if(video) { video.pause(); video.currentTime = 0; } window.location.href = 'simulator.html'; }, 2500); } }
    
    function renderMachines() { let container = document.getElementById('allMachinesContainer'); if(!container) return; let categories = { "新機": machines.filter(m => m.isNew === true), "人氣機台": machines.filter(m => m.popular === true), "4號機": machines.filter(m => m.model === "4號機"), "5號機": machines.filter(m => m.model === "5號機"), "6號機": machines.filter(m => m.model === "6號機") }; let html = ''; for(let [catName, catMachines] of Object.entries(categories)) { if(catMachines.length === 0) continue; html += `<div class="category-section mt-4" data-category="${catName}"><h2 class="category-title"><i class="fa fa-gamepad"></i> ${catName} <span class="text-xs ml-2">共${catMachines.length}款</span></h2><div class="vertical-grid">`; for(let m of catMachines) { let stats = getMachineStats(m.name); let modelNum = m.model.charAt(0); html += `<div class="game-card-bg machine-card" data-vendor="${m.vendor}" data-model="${m.model}" data-setting="${m.setting}" data-status="${m.status}">${m.popular ? '<span class="popular-badge"><i class="fa fa-fire"></i> 人氣</span>' : ''}${m.isNew ? '<div class="new-machine-badge"><img src="https://4boom.jp/blog/wp-content/uploads/2019/08/shin_aut-3_y-240x89.png" alt="新機入替"></div>' : ''}<img src="${m.img}" alt="${m.name}" onerror="this.src='https://i.pinimg.com/736x/4a/2a/30/4a2a3089197d997984a7a75921faf2d9.jpg'"><div class="p-2"><div class="card-title-row"><div class="card-title-wrapper"><span class="card-title-scroll">${m.name}</span></div><span class="machine-badge badge-${modelNum}">${m.model}</span></div><div class="vendor-info"><span class="vendor-name">${m.vendor}</span><div class="status-stats"><span class="stat-icon-only"><i class="fa fa-circle-o empty-count"></i> ${stats.empty}</span><span class="stat-icon-only"><i class="fa fa-bolt using-count"></i> ${stats.using}</span></div></div><button class="enter-btn" data-machine="${m.name}">進入遊戲</button></div></div>`; } html += `</div></div>`; } container.innerHTML = html; document.querySelectorAll('.enter-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); openMachineModal(btn.dataset.machine); })); setTimeout(() => { document.querySelectorAll('.card-title-wrapper').forEach(wrapper => { const span = wrapper.querySelector('.card-title-scroll'); if (span && span.scrollWidth > wrapper.clientWidth) wrapper.classList.add('scrollable'); else wrapper.classList.remove('scrollable'); }); }, 100); }
    function openMachineModal(name) { document.getElementById('modalMachineName').textContent = name; generateSubMachines(name); document.getElementById('machineModal').classList.add('show'); }
    function closeMachineModal() { document.getElementById('machineModal').classList.remove('show'); }
    
    let bannerIndex = 0;
    function initBanner() { let slider = document.getElementById('bannerSlider'), dotsContainer = document.getElementById('bannerDots'); if(!slider) return; let imgs = slider.children; for(let i = 0; i < imgs.length; i++) { let dot = document.createElement('span'); dot.className = 'banner-dot' + (i === 0 ? ' active' : ''); dot.addEventListener('click', () => updateBanner(i)); dotsContainer.appendChild(dot); } function updateBanner(idx) { slider.style.transform = `translateX(-${idx * 100}%)`; Array.from(dotsContainer.children).forEach((d,i) => d.classList.toggle('active', i === idx)); bannerIndex = idx; } setInterval(() => updateBanner((bannerIndex + 1) % imgs.length), 5000); }
    function initFilters() { const allVendors = ['ELECO', 'ENTER RISE', 'Olympia', 'Kita Denshi', 'Sammy', 'Daito', 'HEIWA', 'Bellco', 'Mizuho', 'Universal Bros', 'Rodeo']; const models = [...new Set(machines.map(m => m.model))]; document.getElementById('vendorFilters').innerHTML = `<span class="filter-chip selected" data-vendor="all">全部</span>` + allVendors.map(v => `<span class="filter-chip" data-vendor="${v}">${v}</span>`).join(''); document.getElementById('modelFilters').innerHTML = `<span class="filter-chip selected" data-model="all">全部</span>` + models.map(m => `<span class="filter-chip" data-model="${m}">${m}</span>`).join(''); document.getElementById('statusFilters').innerHTML = `<span class="filter-chip selected" data-status="all">全部</span><span class="filter-chip" data-status="empty">空檯</span><span class="filter-chip" data-status="using">使用中</span>`; let currentFilters = { vendor: 'all', model: 'all', status: 'all' }; function attachListener(container, type) { container.querySelectorAll('.filter-chip').forEach(chip => { chip.addEventListener('click', function() { container.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('selected')); this.classList.add('selected'); currentFilters[type] = this.dataset[type]; }); }); } attachListener(document.getElementById('vendorFilters'), 'vendor'); attachListener(document.getElementById('modelFilters'), 'model'); attachListener(document.getElementById('statusFilters'), 'status'); document.getElementById('clearFilters').addEventListener('click', () => { currentFilters = { vendor: 'all', model: 'all', status: 'all' }; document.querySelectorAll('.filter-chip').forEach(chip => { if(chip.dataset.vendor === 'all' || chip.dataset.model === 'all' || chip.dataset.status === 'all') chip.classList.add('selected'); else chip.classList.remove('selected'); }); }); document.getElementById('applyFilters').addEventListener('click', () => { document.querySelectorAll('.machine-card').forEach(card => { let show = true; if(currentFilters.vendor !== 'all' && card.dataset.vendor !== currentFilters.vendor) show = false; if(currentFilters.model !== 'all' && card.dataset.model !== currentFilters.model) show = false; if(currentFilters.status !== 'all' && card.dataset.status !== currentFilters.status) show = false; card.style.display = show ? 'block' : 'none'; }); document.querySelectorAll('.category-section').forEach(section => { let hasVisible = Array.from(section.querySelectorAll('.machine-card')).some(c => c.style.display !== 'none'); section.style.display = hasVisible ? 'block' : 'none'; }); document.getElementById('filterDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }); }
    function initTabs() { let tabs = ['全部', '新機', '人氣機台', '4號機', '5號機', '6號機']; let wrapper = document.getElementById('tabsWrapper'); wrapper.innerHTML = tabs.map(t => `<button class="tab-btn ${t === '全部' ? 'tech-tab-active' : ''}" data-tab="${t}">${t}</button>`).join(''); let btns = document.querySelectorAll('.tab-btn'); let sections = () => document.querySelectorAll('.category-section'); function filterByTab(tab) { sections().forEach(sec => { sec.style.display = (tab === '全部' || sec.dataset.category === tab) ? 'block' : 'none'; }); } btns.forEach(btn => { btn.addEventListener('click', () => { btns.forEach(b => b.classList.remove('tech-tab-active')); btn.classList.add('tech-tab-active'); filterByTab(btn.dataset.tab); }); }); filterByTab('全部'); }
    
    function handleNavigation() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('current-page'));
                item.classList.add('current-page');
                const page = item.dataset.page;
                if(page === 'home' || page === 'machines') {
                    renderMachines();
                } else if(page === 'lobby') {
                    document.getElementById('allMachinesContainer').innerHTML = '<div class="text-center p-4"><i class="fa fa-cube fa-3x mb-2" style="color:#bf5eff;"></i><p class="text-2xl font-bold mb-2">✨ 賽博大廳 ✨</p><p>⚡ 小丑系列挑戰賽 · 冠軍殿堂 ⚡</p><p>🎰 累積積分換好禮 · 即日起至4月底</p><div class="mt-4 p-3 border border-purple-500 rounded-2xl bg-purple-900/30"><i class="fa fa-users mr-2"></i>在線人數: 1,288 人</div></div>';
                } else if(page === 'news') {
                    document.getElementById('allMachinesContainer').innerHTML = '<div class="text-center p-4"><i class="fa fa-bell fa-2x mb-2"></i><p>📢 最新公告：小丑系列全面升級！4/6號機新規格導入</p></div>';
                } else if(page === 'profile') {
                    document.getElementById('allMachinesContainer').innerHTML = `<div class="text-center p-4"><i class="fa fa-user-circle fa-3x mb-2"></i><p>👤 會員名稱：夫人會生氣</p><p>💰 持有點數：${userPoints.toLocaleString()} 點</p><p>⚙️ 更多功能開發中</p></div>`;
                }
                document.querySelector('.main-content').scrollTop = 0;
            });
        });
    }
    
    function bindEvents() {
        document.getElementById('modalCloseBtn')?.addEventListener('click', closeMachineModal);
        document.getElementById('machineModal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('machineModal')) closeMachineModal(); });
        document.getElementById('confirmCancelBtn')?.addEventListener('click', closeConfirmModalOnly);
        document.getElementById('closeXBtn')?.addEventListener('click', closeConfirmModalOnly);
        document.getElementById('confirmOk')?.addEventListener('click', doEnterGame);
        document.getElementById('closeAlertBtn')?.addEventListener('click', closeMinPointsAlert);
        document.getElementById('minPointsAlert')?.addEventListener('click', (e) => { if(e.target === e.currentTarget) closeMinPointsAlert(); });
        const settlementModalHtml = `<div class="settlement-modal" id="settlementModal"><div class="settlement-content"><div class="sub-confirm-header"><h3>📊 離座結算</h3><p id="settlementSubName">GOGO 小丑 1號機</p></div><div class="settlement-detail" id="settlementDetail"></div><div class="settlement-actions"><button class="settlement-btn" id="settlementCancelBtn" style="background: linear-gradient(145deg, #3a4050, #2a2f40); border-color: #4a80c0; color: #b0c4de;">取消</button><button class="settlement-btn" id="settlementNextBtn" style="background: linear-gradient(145deg, #ffaa33, #ff8c00); border: 1px solid #ffd700; color: #2a1f0a;">下一步</button></div></div></div>
        <div class="confirm-leave-modal" id="confirmLeaveModal"><div class="confirm-leave-content"><div class="sub-confirm-header"><h3>⚠️ 確認離座</h3><p id="confirmLeaveSubName">GOGO 小丑 1號機</p></div><div class="settlement-detail" id="confirmLeaveDetail"></div><div class="confirm-leave-actions"><button class="confirm-leave-btn" id="confirmLeaveCancelBtn" style="background: linear-gradient(145deg, #3a4050, #2a2f40); border-color: #4a80c0; color: #b0c4de;">再想想</button><button class="confirm-leave-btn" id="confirmLeaveOkBtn" style="background: linear-gradient(145deg, #ffaa33, #ff8c00); border: 1px solid #ffd700; color: #2a1f0a;">確認離座</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', settlementModalHtml);
        document.getElementById('settlementCancelBtn')?.addEventListener('click', closeSettlementModal);
        document.getElementById('settlementNextBtn')?.addEventListener('click', openConfirmLeaveModal);
        document.getElementById('confirmLeaveCancelBtn')?.addEventListener('click', closeConfirmLeaveModal);
        document.getElementById('confirmLeaveOkBtn')?.addEventListener('click', executeLeave);
        let openDrawer = document.getElementById('openDrawerBtn'), drawer = document.getElementById('filterDrawer'), overlay = document.getElementById('drawerOverlay');
        if(openDrawer && drawer && overlay) { openDrawer.addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('open'); }); overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); }); }
        let mainScroller = document.getElementById('machineList'), backTop = document.getElementById('backToTop'); if(mainScroller) mainScroller.addEventListener('scroll', () => backTop?.classList.toggle('show', mainScroller.scrollTop > 200)); if(backTop) backTop.addEventListener('click', () => mainScroller?.scrollTo({ top: 0, behavior: 'smooth' })); document.getElementById('nicknameDisplay').textContent = '夫人會生氣'; updatePointsDisplay();
    }
    
    window.switchAllPages = switchAllPages;
    window.switchCardPage = switchCardPage;
    window.switchPage = switchPage;
    window.openSubConfirm = openSubConfirm;
    window.filterSubByRatio = filterSubByRatio;
    window.openSettlementModal = openSettlementModal;
    window.toggleFavorite = toggleFavorite;
    window.currentRatioFilter = currentRatioFilter;
    
    function init() { renderMachines(); initBanner(); initFilters(); initTabs(); bindEvents(); handleNavigation(); }
    init();
})();
</script>
