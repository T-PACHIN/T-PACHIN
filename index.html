    <div class="hologram-content">
        <video id="mascotVideo" autoplay muted loop playsinline src="https://video.wixstatic.com/video/d5e540_d63f842135e8416f891842373bc0f582/720p/mp4/file.mp4" style="width:100%;border-radius:20px"></video>
        <div class="loading-text" id="loadingMachineTitle">LOADING</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
</div>

<script src="shared.js"></script>
<script>
(function() {
    // ==================== 點數與佔用紀錄 ====================
    let userPoints = 6600;
    let currentOccupiedTokens = {};
    let currentSubDataInfo = null;
    let pendingLeaveInfo = null;
    let currentRatioFilter = "all";
    
    // 同步 shared.js 的點數
    if (window.T_PACHIN_STORAGE) {
        userPoints = T_PACHIN_STORAGE.getPoints();
    }
    
    // 主機台資料
    const machines = [
        { name:"GOGO 小丑", vendor:"Olympia", model:"6號機", setting:"6", status:"using", popular:true, isNew:true, img:"https://i.pinimg.com/736x/b1/f1/ec/b1f1ec3a191e62e3d0e300ce79c9b593.jpg" },
        { name:"我是小丑-EX", vendor:"Sanyo", model:"5號機", setting:"5", status:"using", popular:true, isNew:true, img:"https://i.pinimg.com/736x/4a/2a/30/4a2a3089197d997984a7a75921faf2d9.jpg" },
        { name:"快樂小丑 VII", vendor:"HEIWA", model:"6號機", setting:"4", status:"empty", popular:false, isNew:true, img:"https://i.pinimg.com/736x/76/a7/ec/76a7eca59c0b7f7a8404e67e043841cb.jpg" },
        { name:"小丑狂歡夜", vendor:"Daito", model:"4號機", setting:"4", status:"empty", popular:true, isNew:false, img:"https://i.pinimg.com/736x/4a/2a/30/4a2a3089197d997984a7a75921faf2d9.jpg" }
    ];
    
    // 子機台完整資料
    const subData = {
        "GOGO 小丑": { ratios:[1.0,2.0,2.5,3.0,4.0,5.0], ids:[1,2,3,4,5,6], bb:[1200,1100,1300,1250,1400,1500], rb:[600,550,650,620,700,750], curr:[180,200,210,195,220,230], total:[4200,4300,4400,4250,4600,4800], status:["occupied","using","maintenance","empty","empty","empty"], maintenanceTime:["佔用中 (您的機台)","","維護中 預計 2025/03/28 14:00 恢復","","",""] },
        "我是小丑-EX": { ratios:[1.0,2.0,2.5,3.0,4.0,5.0], ids:[1,2,3,4,5,6], bb:[1100,1150,1200,1180,1300,1350], rb:[520,540,560,550,600,620], curr:[210,220,230,215,240,250], total:[3800,3900,4000,3850,4100,4300], status:["using","occupied","maintenance","empty","empty","empty"], maintenanceTime:["","佔用中 (您的機台)","維護中 預計 2025/03/29 10:30 恢復","","",""] },
        "快樂小丑 VII": { ratios:[1.0,2.0,2.5,3.0,4.0,5.0], ids:[1,2,3,4,5,6], bb:[1000,1050,1100,1080,1200,1250], rb:[480,500,520,510,550,580], curr:[160,170,180,175,190,200], total:[3500,3600,3700,3550,3800,4000], status:["empty","using","occupied","maintenance","empty","empty"], maintenanceTime:["","","佔用中 (您的機台)","維護中 預計 2025/03/30 09:00 恢復","",""] },
        "小丑狂歡夜": { ratios:[1.0,2.0,2.5,3.0,4.0,5.0], ids:[1,2,3,4,5,6], bb:[900,950,1000,980,1050,1100], rb:[450,470,490,480,500,520], curr:[140,150,160,155,170,180], total:[3200,3300,3400,3350,3600,3800], status:["empty","empty","empty","empty","empty","empty"], maintenanceTime:["","","","","",""] }
    };
    
    function updatePointsDisplay() {
        document.getElementById('tokenBtn').textContent = userPoints.toLocaleString();
        if(document.getElementById('confirmPoints')) document.getElementById('confirmPoints').textContent = userPoints.toLocaleString();
        if(document.getElementById('confirmTokenRemain')) document.getElementById('confirmTokenRemain').innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${userPoints.toLocaleString()}`;
        if(window.T_PACHIN_STORAGE) T_PACHIN_STORAGE.setPoints(userPoints);
    }
    
    function updatePoints(changeAmount) {
        userPoints += changeAmount;
        updatePointsDisplay();
        return userPoints;
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = `<i class="fa fa-info-circle mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function getMachineStats(machineName) {
        let data = subData[machineName];
        if(!data) return { empty: 0, using: 0 };
        let empty = 0, using = 0;
        data.status.forEach(s => { if(s === 'empty') empty++; else if(s === 'using') using++; });
        return { empty, using };
    }
    
    // 生成8格迷你卡片數據
    function generateMiniCards(data, idx) {
        const values = [ Math.floor(data.bb[idx]/4), Math.floor(data.bb[idx]/3.5), Math.floor(data.bb[idx]/3), Math.floor(data.rb[idx]/2.5), Math.floor(data.rb[idx]/2), Math.floor(data.rb[idx]/1.8), data.curr[idx], Math.floor(data.total[idx]/5) ];
        let cardsHtml = '';
        for (let i = 0; i < 8; i++) {
            let fillCount = values[i] > 400 ? 5 : values[i] > 300 ? 4 : values[i] > 200 ? 3 : values[i] > 100 ? 2 : 1;
            let colorClass = (i < 3) ? 'filled-red' : 'filled-green';
            let barsHtml = '';
            for (let s = 0; s < 5; s++) barsHtml += `<div class="card-bar-segment ${(s < fillCount) ? colorClass : ''}"></div>`;
            cardsHtml += `<div class="mini-card"><div class="card-number">${i+1}</div><div class="card-bars">${barsHtml}</div><div class="card-value">${values[i].toLocaleString()}</div></div>`;
        }
        return cardsHtml;
    }
    
    function switchCardPage(card) {
        let p1 = card.querySelector('.page1'), p2 = card.querySelector('.page2'), d = card.querySelectorAll('.sub-dot');
        if(p1.classList.contains('active')) { p1.classList.remove('active'); p2.classList.add('active'); d[0].classList.remove('active'); d[1].classList.add('active'); }
        else { p1.classList.add('active'); p2.classList.remove('active'); d[0].classList.add('active'); d[1].classList.remove('active'); }
    }
    
    function switchPage(dot, pageNum) {
        let card = dot.closest('.sub-card'), p1 = card.querySelector('.page1'), p2 = card.querySelector('.page2'), d = card.querySelectorAll('.sub-dot');
        if(pageNum === 1) { p1.classList.add('active'); p2.classList.remove('active'); d[0].classList.add('active'); d[1].classList.remove('active'); }
        else { p1.classList.remove('active'); p2.classList.add('active'); d[0].classList.remove('active'); d[1].classList.add('active'); }
    }
    
    function switchAllPages(pageNum) {
        let tabs = document.querySelectorAll('.data-mini-tab');
        tabs.forEach((t,i) => t.classList.toggle('active', i === pageNum-1));
        document.querySelectorAll('.sub-card').forEach(card => {
            let p1 = card.querySelector('.page1'), p2 = card.querySelector('.page2'), d = card.querySelectorAll('.sub-dot');
            if(pageNum === 1) { p1.classList.add('active'); p2.classList.remove('active'); d[0].classList.add('active'); d[1].classList.remove('active'); }
            else { p1.classList.remove('active'); p2.classList.add('active'); d[0].classList.remove('active'); d[1].classList.add('active'); }
        });
    }
    
    function filterSubByRatio() {
        const subCards = document.querySelectorAll('#submachineContainer .sub-card');
        if(!subCards.length) return;
        subCards.forEach(card => {
            const ratioValue = parseFloat(card.getAttribute('data-ratio-value'));
            if (isNaN(ratioValue)) return;
            let show = true;
            if(currentRatioFilter !== "all") show = Math.abs(ratioValue - parseFloat(currentRatioFilter)) < 0.01;
            card.style.display = show ? 'block' : 'none';
        });
    }
    
    function generateSubMachines(machineName) {
        let data = subData[machineName];
        if(!data) return;
        let container = document.getElementById('submachineContainer');
        if(!container) return;
        
        // 排序：空檯 > 佔用 > 使用中 > 維護中
        let subItems = [];
        for(let i = 0; i < data.ids.length; i++) {
            let status = data.status[i];
            let weight = status === 'empty' ? 1 : status === 'occupied' ? 2 : status === 'using' ? 3 : 4;
            subItems.push({ idx: i, weight: weight, status: status });
        }
        subItems.sort((a,b) => a.weight - b.weight);
        
        const uniqueRatios = [...new Set(data.ratios.map(r => r.toString()))];
        uniqueRatios.sort((a,b) => parseFloat(a)-parseFloat(b));
        let ratioOptions = '<option value="all">全部倍率</option>';
        uniqueRatios.forEach(ratio => { ratioOptions += `<option value="${ratio}">${ratio}</option>`; });
        
        let html = `<div class="data-mini-tabs"><div class="tabs-left"><div class="data-mini-tab active" onclick="window.switchAllPages(1)">數據1</div><div class="data-mini-tab" onclick="window.switchAllPages(2)">數據2</div></div><select id="subRatioSelect" class="ratio-select-mini" onchange="window.currentRatioFilter=this.value; window.filterSubByRatio();">${ratioOptions}</select></div><div class="submachine-container" id="submachineList">`;
        
        for(let item of subItems) {
            let i = item.idx;
            let status = data.status[i];
            let isMaint = status === 'maintenance', isUsing = status === 'using', isOccupied = status === 'occupied';
            let statusClass = '', statusBadge = '';
            if(isOccupied) { statusClass = 'occupied-card'; statusBadge = '<span class="occupied-badge-small"><i class="fa fa-user"></i> 佔用中</span>'; }
            else if(isUsing) { statusClass = 'using-card'; statusBadge = '<span class="using-badge-small"><i class="fa fa-bolt"></i> 使用中</span>'; }
            else if(isMaint) { statusClass = 'maintenance-card'; statusBadge = '<span class="maintenance-badge-small"><i class="fa fa-wrench"></i> 維護中</span>'; }
            else { statusBadge = '<span class="empty-badge-small"><i class="fa fa-circle-o"></i> 空檯</span>'; }
            let maintTimeHtml = (isMaint && data.maintenanceTime[i]) ? `<div class="maintenance-time"><i class="fa fa-calendar"></i> ${data.maintenanceTime[i]}</div>` : '';
            let miniCardsHtml = generateMiniCards(data, i);
            let canEnter = (status === 'empty' || status === 'occupied');
            let btnText = isUsing ? '🔴 使用中' : isMaint ? '🔧 維護中' : isOccupied ? '🎮 進入遊戲' : '進入遊戲';
            let occupiedKey = `${machineName}_${data.ids[i]}`;
            let isUserOccupied = (status === 'occupied' && currentOccupiedTokens[occupiedKey]);
            let leaveBtnHtml = (isOccupied && isUserOccupied) ? `<div class="leave-small" onclick="event.stopPropagation(); window.openSettlementModal('${machineName}','${data.ids[i]}號機',${data.ids[i]}, ${data.ratios[i]})"><i class="fa fa-sign-out"></i> 離座</div>` : '';
            let ratioValue = data.ratios[i];
            html += `<div class="sub-card ${statusClass}" onclick="window.switchCardPage(this)" data-ratio-value="${ratioValue}">
                <div class="sub-title-row"><span class="sub-machine-name">${machineName} ${data.ids[i]}號機 ${statusBadge}</span>
                <div class="rate-info-group"><span class="sub-ratio-badge"><i class="fa fa-ticket"></i> 每枚 ${ratioValue}</span><span class="point-value-badge"><i class="fa fa-exchange"></i> 得點 0.9</span></div></div>
                ${maintTimeHtml}
                <div class="sub-page page1 active"><div class="stats-grid"><div class="stat-cell"><div class="stat-label">BIG BONUS</div><div class="stat-number bb-number">${data.bb[i].toLocaleString()}</div></div><div class="stat-cell"><div class="stat-label">REG BONUS</div><div class="stat-number rb-number">${data.rb[i].toLocaleString()}</div></div><div class="stat-cell"><div class="stat-label">目前累積</div><div class="stat-number curr-number">${data.curr[i].toLocaleString()}</div></div><div class="stat-cell"><div class="stat-label">總計</div><div class="stat-number total-number">${data.total[i].toLocaleString()}</div></div></div></div>
                <div class="sub-page page2"><div class="mini-cards-row">${miniCardsHtml}</div></div>
                <div class="sub-page-indicator"><span class="sub-dot active" onclick="event.stopPropagation(); window.switchPage(this,1)"></span><span class="sub-dot" onclick="event.stopPropagation(); window.switchPage(this,2)"></span></div>
                <div class="sub-card-actions"><div class="enter-small ${!canEnter ? 'disabled' : ''}" onclick="event.stopPropagation(); ${canEnter ? `window.openSubConfirm('${machineName}','${data.ids[i]}號機','${ratioValue}',${data.ids[i]})` : `alert('此機台${isUsing?'使用中':isMaint?'維護中':''}，無法進入！');`}">${btnText}</div>${leaveBtnHtml}<div class="favorite-small" onclick="event.stopPropagation(); window.toggleFavorite('${machineName}', ${data.ids[i]}, '${ratioValue}')"><i class="fa fa-heart-o"></i></div></div>
            </div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        const ratioSelect = document.getElementById('subRatioSelect');
        if(ratioSelect) ratioSelect.onchange = function() { currentRatioFilter = this.value; filterSubByRatio(); };
        filterSubByRatio();
    }
    
    // 收藏功能
    function toggleFavorite(machineName, machineId, ratio) {
        const machine = { id: machineId, name: machineName, ratio: ratio };
        if(window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.toggleFavorite(machine);
            showToast(`❤️ ${machineName} ${machineId}號機 已${T_PACHIN_STORAGE.isFavorite(machineId) ? '加入收藏' : '取消收藏'}`);
        } else {
            showToast(`❤️ ${machineName} ${machineId}號機 已收藏`);
        }
    }
    
    // 離座結算相關函數
    function openSettlementModal(machineName, subName, machineId, ratioValue) {
        let key = `${machineName}_${machineId}`;
        let usedTokens = currentOccupiedTokens[key] || Math.floor(1000 / ratioValue);
        let totalRedeemPoints = Math.floor(usedTokens * 0.9);
        pendingLeaveInfo = { machineName, machineId, usedTokens, totalRedeemPoints, subName };
        document.getElementById('settlementSubName').textContent = `${machineName} ${subName}`;
        document.getElementById('settlementDetail').innerHTML = `<div class="settlement-row"><span class="settlement-label">持有代幣</span><span class="settlement-value">${usedTokens.toLocaleString()} 枚</span></div><div class="settlement-row"><span class="settlement-label">可得點數</span><span class="settlement-value">${totalRedeemPoints.toLocaleString()} 點</span></div>`;
        document.getElementById('settlementModal').classList.add('show');
    }
    
    function closeSettlementModal() { document.getElementById('settlementModal').classList.remove('show'); }
    
    function openConfirmLeaveModal() {
        if(pendingLeaveInfo) {
            let { machineName, subName, usedTokens, totalRedeemPoints } = pendingLeaveInfo;
            document.getElementById('confirmLeaveSubName').textContent = `${machineName} ${subName}`;
            document.getElementById('confirmLeaveDetail').innerHTML = `<div class="settlement-row"><span class="settlement-label">持有代幣</span><span class="settlement-value">${usedTokens.toLocaleString()} 枚</span></div><div class="settlement-row"><span class="settlement-label">可得點數</span><span class="settlement-value">${totalRedeemPoints.toLocaleString()} 點</span></div>`;
            document.getElementById('settlementModal').classList.remove('show');
            document.getElementById('confirmLeaveModal').classList.add('show');
        }
    }
    
    function closeConfirmLeaveModal() { document.getElementById('confirmLeaveModal').classList.remove('show'); pendingLeaveInfo = null; }
    
    function executeLeave() {
        if(pendingLeaveInfo) {
            let { machineName, machineId, usedTokens, totalRedeemPoints, subName } = pendingLeaveInfo;
            if(subData[machineName] && subData[machineName].status[machineId-1]) {
                subData[machineName].status[machineId-1] = 'empty';
                subData[machineName].maintenanceTime[machineId-1] = '';
                updatePoints(totalRedeemPoints);
                delete currentOccupiedTokens[`${machineName}_${machineId}`];
            }
            generateSubMachines(machineName);
            document.getElementById('confirmLeaveModal').classList.remove('show');
            showToast(`✅ 離座成功！獲得 ${totalRedeemPoints.toLocaleString()} 點數`);
            pendingLeaveInfo = null;
        }
    }
    
    function showMinPointsAlert() { document.getElementById('minPointsAlert').classList.add('show'); }
    function closeMinPointsAlert() { document.getElementById('minPointsAlert').classList.remove('show'); }
    
    function openSubConfirm(machineName, subName, ratioValue, machineId) {
        currentSubDataInfo = { machineName, subName, ratioValue: parseFloat(ratioValue), machineId: machineId };
        document.getElementById('confirmMachineName').textContent = machineName;
        document.getElementById('confirmSubName').textContent = subName;
        document.getElementById('confirmRatio').textContent = ratioValue;
        document.getElementById('confirmPoints').textContent = userPoints;
        document.getElementById('confirmTokenInput').value = 1000;
        function updateRemain() {
            let val = parseInt(document.getElementById('confirmTokenInput').value) || 0;
            let tokens = Math.floor(val / currentSubDataInfo.ratioValue);
            document.getElementById('confirmTokenRemain').innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${(userPoints - val).toLocaleString()}`;
            document.getElementById('exchangeTokens').textContent = `${tokens.toLocaleString()} 枚`;
        }
        updateRemain();
        document.getElementById('confirmTokenInput').oninput = updateRemain;
        document.getElementById('subConfirmModal').classList.add('show');
    }
    
    function closeConfirmModalOnly() { document.getElementById('subConfirmModal').classList.remove('show'); currentSubDataInfo = null; }
    
    // 進入遊戲 - 會跳轉到 simulator.html
    function doEnterGame() {
        if(currentSubDataInfo) {
            const usedPoints = parseInt(document.getElementById('confirmTokenInput').value) || 0;
            if(usedPoints <= 0) { showToast('請輸入大於 0 的點數'); return; }
            if(usedPoints < 50) { showMinPointsAlert(); return; }
            if(usedPoints > userPoints) { showToast('❌ 點數不足！'); return; }
            
            const exchangeTokens = Math.floor(usedPoints / currentSubDataInfo.ratioValue);
            updatePoints(-usedPoints);
            
            const occupiedKey = `${currentSubDataInfo.machineName}_${currentSubDataInfo.machineId}`;
            currentOccupiedTokens[occupiedKey] = exchangeTokens;
            
            if(subData[currentSubDataInfo.machineName] && subData[currentSubDataInfo.machineName].status[currentSubDataInfo.machineId-1]) {
                subData[currentSubDataInfo.machineName].status[currentSubDataInfo.machineId-1] = 'occupied';
                subData[currentSubDataInfo.machineName].maintenanceTime[currentSubDataInfo.machineId-1] = '佔用中 (您的機台)';
            }
            
            // 儲存機台資訊到 localStorage，供 simulator.html 讀取
            const machineInfo = { 
                name: currentSubDataInfo.machineName, 
                subName: currentSubDataInfo.subName, 
                ratio: currentSubDataInfo.ratioValue, 
                machineId: currentSubDataInfo.machineId, 
                coins: exchangeTokens 
            };
            localStorage.setItem('t_pachin_machine_info', JSON.stringify(machineInfo));
            
            const video = document.getElementById('mascotVideo');
            if(video) video.play().catch(e=>{});
            document.getElementById('hologramLoading').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('subConfirmModal').classList.remove('show');
                document.getElementById('hologramLoading').classList.remove('show');
                if(video) { video.pause(); video.currentTime = 0; }
                // 跳轉到模擬器頁面
                window.location.href = 'simulator.html';
            }, 2500);
        }
    }
    
    // 主機台渲染
    function renderMachines() {
        let container = document.getElementById('allMachinesContainer');
        if(!container) return;
        let categories = { 
            "新機": machines.filter(m => m.isNew === true), 
            "人氣機台": machines.filter(m => m.popular === true), 
            "4號機": machines.filter(m => m.model === "4號機"), 
            "5號機": machines.filter(m => m.model === "5號機"), 
            "6號機": machines.filter(m => m.model === "6號機") 
        };
        let html = '';
        for(let [catName, catMachines] of Object.entries(categories)) {
            if(catMachines.length === 0) continue;
            html += `<div class="category-section mt-4" data-category="${catName}"><h2 class="category-title"><i class="fa fa-gamepad"></i> ${catName} <span class="text-xs ml-2">共${catMachines.length}款</span></h2><div class="vertical-grid">`;
            for(let m of catMachines) {
                let stats = getMachineStats(m.name);
                let modelNum = m.model.charAt(0);
                html += `<div class="game-card-bg machine-card" data-vendor="${m.vendor}" data-model="${m.model}" data-setting="${m.setting}" data-status="${m.status}">
                    ${m.popular ? '<span class="popular-badge"><i class="fa fa-fire"></i> 人氣</span>' : ''}
                    ${m.isNew ? '<div class="new-machine-badge"><img src="https://4boom.jp/blog/wp-content/uploads/2019/08/shin_aut-3_y-240x89.png" alt="新機入替"></div>' : ''}
                    <img src="${m.img}" alt="${m.name}" onerror="this.src='https://i.pinimg.com/736x/4a/2a/30/4a2a3089197d997984a7a75921faf2d9.jpg'">
                    <div class="p-2">
                        <div class="card-title-row"><div class="card-title-wrapper"><span class="card-title-scroll">${m.name}</span></div><span class="machine-badge badge-${modelNum}">${m.model}</span></div>
                        <div class="vendor-info"><span class="vendor-name">${m.vendor}</span><div class="status-stats"><span class="stat-icon-only"><i class="fa fa-circle-o empty-count"></i> ${stats.empty}</span><span class="stat-icon-only"><i class="fa fa-bolt using-count"></i> ${stats.using}</span></div></div>
                        <button class="enter-btn" data-machine="${m.name}">進入遊戲</button>
                    </div>
                </div>`;
            }
            html += `</div></div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.enter-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); openMachineModal(btn.dataset.machine); }));
        setTimeout(() => {
            document.querySelectorAll('.card-title-wrapper').forEach(wrapper => {
                const span = wrapper.querySelector('.card-title-scroll');
                if (span && span.scrollWidth > wrapper.clientWidth) wrapper.classList.add('scrollable');
                else wrapper.classList.remove('scrollable');
            });
        }, 100);
    }
    
    function openMachineModal(name) { document.getElementById('modalMachineName').textContent = name; generateSubMachines(name); document.getElementById('machineModal').classList.add('show'); }
    function closeMachineModal() { document.getElementById('machineModal').classList.remove('show'); }
    
    // 輪播
    let bannerIndex = 0;
    function initBanner() {
        let slider = document.getElementById('bannerSlider'), dotsContainer = document.getElementById('bannerDots');
        if(!slider) return;
        let imgs = slider.children;
        for(let i = 0; i < imgs.length; i++) {
            let dot = document.createElement('span');
            dot.className = 'banner-dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => updateBanner(i));
            dotsContainer.appendChild(dot);
        }
        function updateBanner(idx) { slider.style.transform = `translateX(-${idx * 100}%)`; Array.from(dotsContainer.children).forEach((d,i) => d.classList.toggle('active', i === idx)); bannerIndex = idx; }
        setInterval(() => updateBanner((bannerIndex + 1) % imgs.length), 5000);
    }
    
    // 篩選器 - 完整廠商列表
    function initFilters() {
        // 完整廠商列表
        const allVendors = ['ELECO', 'ENTER RISE', 'Olympia', 'Kita Denshi', 'Sammy', 'Daito', 'HEIWA', 'Bellco', 'Mizuho', 'Universal Bros', 'Rodeo'];
        const models = [...new Set(machines.map(m => m.model))];
        
        document.getElementById('vendorFilters').innerHTML = `<span class="filter-chip selected" data-vendor="all">全部</span>` + allVendors.map(v => `<span class="filter-chip" data-vendor="${v}">${v}</span>`).join('');
        document.getElementById('modelFilters').innerHTML = `<span class="filter-chip selected" data-model="all">全部</span>` + models.map(m => `<span class="filter-chip" data-model="${m}">${m}</span>`).join('');
        document.getElementById('statusFilters').innerHTML = `<span class="filter-chip selected" data-status="all">全部</span><span class="filter-chip" data-status="empty">空檯</span><span class="filter-chip" data-status="using">使用中</span>`;
        
        let currentFilters = { vendor: 'all', model: 'all', status: 'all' };
        
        function attachListener(container, type) {
            container.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', function() {
                    container.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    currentFilters[type] = this.dataset[type];
                });
            });
        }
        attachListener(document.getElementById('vendorFilters'), 'vendor');
        attachListener(document.getElementById('modelFilters'), 'model');
        attachListener(document.getElementById('statusFilters'), 'status');
        
        document.getElementById('clearFilters').addEventListener('click', () => {
            currentFilters = { vendor: 'all', model: 'all', status: 'all' };
            document.querySelectorAll('.filter-chip').forEach(chip => {
                if(chip.dataset.vendor === 'all' || chip.dataset.model === 'all' || chip.dataset.status === 'all') chip.classList.add('selected');
                else chip.classList.remove('selected');
            });
        });
        document.getElementById('applyFilters').addEventListener('click', () => {
            document.querySelectorAll('.machine-card').forEach(card => {
                let show = true;
                if(currentFilters.vendor !== 'all' && card.dataset.vendor !== currentFilters.vendor) show = false;
                if(currentFilters.model !== 'all' && card.dataset.model !== currentFilters.model) show = false;
                if(currentFilters.status !== 'all' && card.dataset.status !== currentFilters.status) show = false;
                card.style.display = show ? 'block' : 'none';
            });
            document.querySelectorAll('.category-section').forEach(section => {
                let hasVisible = Array.from(section.querySelectorAll('.machine-card')).some(c => c.style.display !== 'none');
                section.style.display = hasVisible ? 'block' : 'none';
            });
            document.getElementById('filterDrawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('open');
        });
    }
    
    function initTabs() {
        let tabs = ['全部', '新機', '人氣機台', '4號機', '5號機', '6號機'];
        let wrapper = document.getElementById('tabsWrapper');
        wrapper.innerHTML = tabs.map(t => `<button class="tab-btn ${t === '全部' ? 'tech-tab-active' : ''}" data-tab="${t}">${t}</button>`).join('');
        let btns = document.querySelectorAll('.tab-btn');
        let sections = () => document.querySelectorAll('.category-section');
        function filterByTab(tab) { sections().forEach(sec => { sec.style.display = (tab === '全部' || sec.dataset.category === tab) ? 'block' : 'none'; }); }
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('tech-tab-active'));
                btn.classList.add('tech-tab-active');
                filterByTab(btn.dataset.tab);
            });
        });
        filterByTab('全部');
    }
    
    // ==================== 導航欄跳轉 ====================
    function initNavigation() {
        // 導覽列按鈕跳轉
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const page = item.dataset.page;
                if (page === 'index') window.location.href = 'index.html';
                else if (page === 'machines') window.location.href = 'machines.html';
                else if (page === 'news') window.location.href = 'news.html';
                else if (page === 'about') window.location.href = 'about.html';
            });
        });
        
        // Logo 跳轉
        document.querySelector('.logo')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });
        
        // 公告按鈕跳轉
        document.querySelector('.combo-announce-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'news.html';
        });
    }
    
    function bindEvents() {
        document.getElementById('modalCloseBtn')?.addEventListener('click', closeMachineModal);
        document.getElementById('machineModal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('machineModal')) closeMachineModal(); });
        document.getElementById('confirmCancelBtn')?.addEventListener('click', closeConfirmModalOnly);
        document.getElementById('closeXBtn')?.addEventListener('click', closeConfirmModalOnly);
        document.getElementById('confirmOk')?.addEventListener('click', doEnterGame);
        document.getElementById('closeAlertBtn')?.addEventListener('click', closeMinPointsAlert);
        document.getElementById('minPointsAlert')?.addEventListener('click', (e) => { if(e.target === e.currentTarget) closeMinPointsAlert(); });
        
        // 離座結算相關彈窗
        const settlementModalHtml = `<div class="settlement-modal" id="settlementModal"><div class="settlement-content"><div class="sub-confirm-header"><h3>📊 離座結算</h3><p id="settlementSubName">GOGO 小丑 1號機</p></div><div class="settlement-detail" id="settlementDetail"></div><div class="settlement-actions"><button class="settlement-btn" id="settlementCancelBtn" style="background: linear-gradient(145deg, #3a4050, #2a2f40); border-color: #4a80c0; color: #b0c4de;">取消</button><button class="settlement-btn" id="settlementNextBtn" style="background: linear-gradient(145deg, #ffaa33, #ff8c00); border: 1px solid #ffd700; color: #2a1f0a;">下一步</button></div></div></div>
        <div class="confirm-leave-modal" id="confirmLeaveModal"><div class="confirm-leave-content"><div class="sub-confirm-header"><h3>⚠️ 確認離座</h3><p id="confirmLeaveSubName">GOGO 小丑 1號機</p></div><div class="settlement-detail" id="confirmLeaveDetail"></div><div class="confirm-leave-actions"><button class="confirm-leave-btn" id="confirmLeaveCancelBtn" style="background: linear-gradient(145deg, #3a4050, #2a2f40); border-color: #4a80c0; color: #b0c4de;">再想想</button><button class="confirm-leave-btn" id="confirmLeaveOkBtn" style="background: linear-gradient(145deg, #ffaa33, #ff8c00); border: 1px solid #ffd700; color: #2a1f0a;">確認離座</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', settlementModalHtml);
        
        document.getElementById('settlementCancelBtn')?.addEventListener('click', closeSettlementModal);
        document.getElementById('settlementNextBtn')?.addEventListener('click', openConfirmLeaveModal);
        document.getElementById('confirmLeaveCancelBtn')?.addEventListener('click', closeConfirmLeaveModal);
        document.getElementById('confirmLeaveOkBtn')?.addEventListener('click', executeLeave);
        
        let openDrawer = document.getElementById('openDrawerBtn'), drawer = document.getElementById('filterDrawer'), overlay = document.getElementById('drawerOverlay');
        if(openDrawer && drawer && overlay) {
            openDrawer.addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('open'); });
            overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); });
        }
        
        let mainScroller = document.getElementById('machineList'), backTop = document.getElementById('backToTop');
        if(mainScroller) mainScroller.addEventListener('scroll', () => backTop?.classList.toggle('show', mainScroller.scrollTop > 200));
        if(backTop) backTop.addEventListener('click', () => mainScroller?.scrollTo({ top: 0, behavior: 'smooth' }));
        
        document.getElementById('nicknameDisplay').textContent = window.T_PACHIN_STORAGE ? T_PACHIN_STORAGE.getNickname() : '夫人會生氣';
        updatePointsDisplay();
    }
    
    // 掛載全域函數
    window.switchAllPages = switchAllPages;
    window.switchCardPage = switchCardPage;
    window.switchPage = switchPage;
    window.openSubConfirm = openSubConfirm;
    window.filterSubByRatio = filterSubByRatio;
    window.openSettlementModal = openSettlementModal;
    window.toggleFavorite = toggleFavorite;
    window.currentRatioFilter = currentRatioFilter;
    
    function init() {
        renderMachines();
        initBanner();
        initFilters();
        initTabs();
        initNavigation();
        bindEvents();
    }
    
    init();
})();
</script>
</body>
</html>
