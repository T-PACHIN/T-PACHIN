</head>

<script src="shared.js"></script>
<script>
(function() {
    // ==================== 機台資料庫 - 與 index.html 完全一致 ====================
    const machineDatabase = [
        { id: 1, name: "GOGO 小丑", sub: "歡樂版", ratio: 2.5, bb: 1200, rb: 600, curr: 180, total: 4200, model: "6號機", vendor: "Olympia" },
        { id: 2, name: "我是小丑-EX", sub: "進化版", ratio: 2.8, bb: 1100, rb: 520, curr: 210, total: 3800, model: "5號機", vendor: "Sammy" },
        { id: 3, name: "快樂小丑 VII", sub: "慶典版", ratio: 2.0, bb: 1000, rb: 480, curr: 160, total: 3500, model: "6號機", vendor: "HEIWA" },
        { id: 4, name: "新我是小丑-EX水晶版", sub: "限定版", ratio: 3.0, bb: 1300, rb: 650, curr: 230, total: 4600, model: "6號機", vendor: "Daito" },
        { id: 5, name: "我的小丑 Ⅳ", sub: "經典版", ratio: 2.0, bb: 880, rb: 420, curr: 140, total: 3100, model: "4號機", vendor: "Yamasa" },
        { id: 6, name: "小丑狂想曲", sub: "狂想版", ratio: 2.2, bb: 900, rb: 450, curr: 150, total: 3300, model: "5號機", vendor: "ELECO" },
        { id: 7, name: "大笑小丑", sub: "歡笑版", ratio: 2.7, bb: 1150, rb: 550, curr: 200, total: 4000, model: "6號機", vendor: "ENTER RISE" },
        { id: 8, name: "小丑之王", sub: "王者版", ratio: 2.1, bb: 850, rb: 400, curr: 130, total: 3000, model: "4號機", vendor: "Kita Denshi" },
        { id: 9, name: "丑角樂園", sub: "樂園版", ratio: 3.2, bb: 1400, rb: 700, curr: 250, total: 5000, model: "5號機", vendor: "Bellco" },
        { id: 10, name: "歡樂小丑", sub: "歡樂版", ratio: 2.3, bb: 950, rb: 480, curr: 170, total: 3600, model: "6號機", vendor: "Mizuho" },
        { id: 11, name: "瘋狂小丑", sub: "瘋狂版", ratio: 2.6, bb: 1050, rb: 500, curr: 190, total: 3900, model: "4號機", vendor: "Universal Bros" },
        { id: 12, name: "小丑嘉年華", sub: "嘉年華版", ratio: 2.9, bb: 1250, rb: 600, curr: 220, total: 4400, model: "5號機", vendor: "Rodeo" }
    ];
    
    const miniCardsData = [{fillCount:3,value:300},{fillCount:5,value:891},{fillCount:2,value:245},{fillCount:4,value:672},{fillCount:1,value:128},{fillCount:5,value:999},{fillCount:3,value:456},{fillCount:2,value:334}];
    const miniCardsData2 = [{fillCount:4,value:512},{fillCount:2,value:203},{fillCount:5,value:876},{fillCount:3,value:445},{fillCount:1,value:98},{fillCount:4,value:678},{fillCount:2,value:267},{fillCount:5,value:1024}];
    
    let currentSubData = null;
    let countdownIntervals = {};
    const POINT_DIFF = 0.15;
    let favorites = [];
    let reserves = [];
    let currentRawPlayed = [];
    let currentFilterDays = 31;
    let playedFiltered = [];
    
    function formatPointsDecimal(v) { 
        return v.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 }); 
    }
    function formatPointsInt(v) { 
        return Math.floor(v).toLocaleString(); 
    }
    
    function getCurrentPoints() {
        if (window.T_PACHIN_STORAGE) {
            return T_PACHIN_STORAGE.getPoints();
        }
        let saved = localStorage.getItem('t_pachin_points');
        return saved ? parseFloat(saved) : 6600;
    }
    
    function updatePointsDisplay() {
        const points = getCurrentPoints();
        const tokenBtn = document.getElementById('tokenBtn');
        const confirmPoints = document.getElementById('confirmPoints');
        const remainPoints = document.getElementById('remainPoints');
        if (tokenBtn) tokenBtn.textContent = formatPointsDecimal(points);
        if (confirmPoints) confirmPoints.textContent = formatPointsDecimal(points);
        if (remainPoints && currentSubData) remainPoints.textContent = formatPointsDecimal(points);
        if (currentSubData) updateCalc();
    }
    
    function saveData() {
        localStorage.setItem('t_pachin_favorites', JSON.stringify(favorites));
        localStorage.setItem('t_pachin_reserves', JSON.stringify(reserves));
        localStorage.setItem('t_pachin_played', JSON.stringify(currentRawPlayed));
    }
    
    function loadData() {
        // 收藏 - 預設3台
        let savedFav = localStorage.getItem('t_pachin_favorites');
        if (savedFav && JSON.parse(savedFav).length > 0) {
            favorites = JSON.parse(savedFav);
        } else {
            favorites = [
                { ...machineDatabase[0] },  // GOGO 小丑
                { ...machineDatabase[2] },  // 快樂小丑 VII
                { ...machineDatabase[5] }   // 小丑狂想曲
            ];
        }
        
        // 保留中 - 預設2台 (修正：使用完整的機台資料)
        let savedRes = localStorage.getItem('t_pachin_reserves');
        if (savedRes && JSON.parse(savedRes).length > 0) {
            reserves = JSON.parse(savedRes);
        } else {
            // 預設保留2台：我是小丑-EX 和 大笑小丑
            let reserveMachine1 = { ...machineDatabase[1] };
            reserveMachine1.reserveTime = '10:00';
            reserveMachine1.expiresAt = Date.now() + 10 * 60 * 1000; // 10分鐘後到期
            
            let reserveMachine2 = { ...machineDatabase[6] };
            reserveMachine2.reserveTime = '15:30';
            reserveMachine2.expiresAt = Date.now() + 25 * 60 * 1000; // 25分鐘後到期
            
            reserves = [reserveMachine1, reserveMachine2];
        }
        
        // 玩過 - 預設4筆
        let savedPlayed = localStorage.getItem('t_pachin_played');
        if (savedPlayed && JSON.parse(savedPlayed).length > 0) {
            currentRawPlayed = JSON.parse(savedPlayed);
        } else {
            let dates = [1, 3, 7, 12].map(day => {
                let dd = new Date();
                dd.setDate(dd.getDate() - day);
                return `${dd.getFullYear()}/${String(dd.getMonth()+1).padStart(2,'0')}/${String(dd.getDate()).padStart(2,'0')}`;
            });
            currentRawPlayed = machineDatabase.slice(0, 4).map((m, i) => ({ 
                ...m, 
                playCount: i + 1, 
                playedDate: dates[i] 
            }));
        }
        saveData();
    }
    
    // 從 machineDatabase 獲取完整機台資料（確保保留中有完整的數據）
    function getFullMachineData(machine) {
        if (!machine || !machine.id) return machine;
        const fullData = machineDatabase.find(m => m.id === machine.id);
        if (fullData) {
            // 保留原有的 reserveTime 和 expiresAt
            return { ...fullData, reserveTime: machine.reserveTime, expiresAt: machine.expiresAt };
        }
        return machine;
    }
    
    function generateMiniCards(data) { 
        let html=''; 
        for(let i=0;i<data.length;i++){ 
            let bars=''; 
            for(let s=0;s<5;s++){ 
                let isRed = s >= 2; 
                let fill = s < data[i].fillCount; 
                bars += `<div class="card-bar-segment ${fill ? (isRed ? 'filled-red' : 'filled-green') : ''}"></div>`; 
            } 
            html += `<div class="mini-card"><div class="card-number">${i+1}</div><div class="card-bars">${bars}</div><div class="card-value">${data[i].value}</div></div>`; 
        } 
        return `<div class="mini-cards-row">${html}</div>`; 
    }
    
    function showToastAlert(machineName, minutesLeft) {
        let existing = document.querySelector('.alert-toast');
        if(existing) existing.remove();
        let toast = document.createElement('div');
        toast.className = 'alert-toast';
        toast.innerHTML = `⚠️ 「${machineName}」保留剩 ${minutesLeft} 分鐘到期 ⚠️`;
        document.body.appendChild(toast);
        setTimeout(() => { if(toast && toast.parentNode) toast.remove(); }, 4000);
    }
    
    function showMessage(t,m){ 
        let d=document.createElement('div'); 
        d.className='alert-popup'; 
        d.innerHTML=`<strong style="color:#ffd700;">${t}</strong> ${m}`; 
        d.style.cssText='position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:10px 20px; border-radius:30px; z-index:10001; border:1px solid #ffd700;'; 
        document.body.appendChild(d); 
        setTimeout(()=>d.remove(),2500); 
    }
    
    function createCardHTML(item, type) {
        if (!item || !item.id) return '';
        
        // 確保有完整的機台數據（特別是 bb, rb, curr, total）
        const displayItem = (type === 'reserve') ? getFullMachineData(item) : item;
        
        let topRow = '';
        if(type === 'reserve') {
            let displayTime = displayItem.reserveTime || '10:00';
            topRow = `<div class="page1-reserve-row"><span class="reserve-text">⏰ 保留倒數</span><span class="time-big" id="countdown-${displayItem.id}">${displayTime}</span></div>`;
        } else if(type === 'played') {
            topRow = `<div class="page1-played-row"><span class="played-text">玩過 ${displayItem.playCount || 1}次</span><span class="played-date">${displayItem.playedDate || ''}</span></div>`;
        }
        const isFav = favorites.some(f => f && f.id === displayItem.id);
        
        return `<div class="flip-card ${type}-card" data-machine-id="${displayItem.id}">
            <div class="page page-1">
                <div class="page1-row1">
                    <div class="model-name"><strong>NO.${displayItem.id}</strong> ${displayItem.name} <span style="color:#aac9ff;">${displayItem.sub || ''}</span></div>
                    <span class="ratio-mini"><i class="fa fa-ticket"></i> 每枚 ${displayItem.ratio}<span class="point-diff-badge-mini">點差 0.15</span></span>
                </div>
                ${topRow}
                <div class="stats-grid">
                    <div class="stat-cell"><div class="stat-label">BB</div><div class="stat-number bb-number">${displayItem.bb}</div></div>
                    <div class="stat-cell"><div class="stat-label">RB</div><div class="stat-number rb-number">${displayItem.rb}</div></div>
                    <div class="stat-cell"><div class="stat-label">當前</div><div class="stat-number curr-number">${displayItem.curr}</div></div>
                    <div class="stat-cell"><div class="stat-label">總回</div><div class="stat-number total-number">${displayItem.total}</div></div>
                </div>
            </div>
            <div class="page page-2 hidden">
                <div class="sub-page active">${generateMiniCards(miniCardsData)}</div>
                <div class="sub-page">${generateMiniCards(miniCardsData2)}</div>
                <div class="sub-page-indicator"><span class="sub-dot active"></span><span class="sub-dot"></span></div>
            </div>
            <div class="card-actions">
                <button class="enter-btn" onclick="window.openSubConfirm('${displayItem.name.replace(/'/g,"\\'")}', ${displayItem.id}, ${displayItem.ratio})">進入遊戲</button>
                ${type === 'reserve' ? `<button class="leave-btn" onclick="window.removeFromReserve(${displayItem.id}, '${displayItem.name.replace(/'/g,"\\'")}')">離開</button>` : ''}
                <button class="favorite-btn ${isFav ? 'active' : 'inactive'}" onclick="window.toggleFavorite(${displayItem.id})"><i class="fa ${isFav ? 'fa-heart' : 'fa-heart-o'}"></i></button>
            </div>
        </div>`;
    }
    
    function updateFavoriteUI(){ 
        let c = document.getElementById('favoriteContainer'), cnt = document.getElementById('favoriteCount'), no = document.getElementById('noFavoriteMsg'); 
        cnt.textContent = favorites.length + ' 台'; 
        if(favorites.length === 0){ 
            c.innerHTML = ''; 
            no.classList.remove('hidden'); 
        } else { 
            no.classList.add('hidden'); 
            c.innerHTML = favorites.map(m => createCardHTML(m, 'favorite')).join(''); 
        } 
        bindEvents(); 
    }
    
    function updateReserveUI(){ 
        let c = document.getElementById('reserveContainer'), cnt = document.getElementById('reserveCount'), no = document.getElementById('noReserveMsg'); 
        cnt.textContent = reserves.length + ' 台'; 
        if(reserves.length === 0){ 
            c.innerHTML = ''; 
            no.classList.remove('hidden'); 
        } else { 
            no.classList.add('hidden'); 
            // 確保每個保留機台都有完整的數據
            c.innerHTML = reserves.map(m => createCardHTML(m, 'reserve')).join(''); 
        } 
        bindEvents(); 
        startAllReserveCountdowns(); 
    }
    
    function updatePlayedUI(){ 
        let c = document.getElementById('playedContainer'), cnt = document.getElementById('playedCount'), no = document.getElementById('noPlayedMsg'); 
        cnt.textContent = playedFiltered.length + ' 台'; 
        if(playedFiltered.length === 0){ 
            c.innerHTML = ''; 
            no.classList.remove('hidden'); 
        } else { 
            no.classList.add('hidden'); 
            c.innerHTML = playedFiltered.map(m => createCardHTML(m, 'played')).join(''); 
        } 
        bindEvents(); 
    }
    
    function filterPlayedByDays(days, raw) { 
        if(!raw || !raw.length) return [];
        const start = new Date(); start.setDate(start.getDate() - days); start.setHours(0,0,0,0);
        return raw.filter(r => { 
            if(!r.playedDate) return false; 
            const parts = r.playedDate.split('/');
            if (parts.length === 3) {
                const [y,m,d] = parts;
                return new Date(parseInt(y), parseInt(m)-1, parseInt(d)) >= start;
            }
            return false;
        }).sort((a,b)=> new Date(b.playedDate) - new Date(a.playedDate));
    }
    
    function applyPlayedFilter(){ 
        playedFiltered = filterPlayedByDays(currentFilterDays, currentRawPlayed); 
        updatePlayedUI(); 
    }
    
    function startReserveCountdown(item, card, timeSpan) {
        if(!item.expiresAt) return;
        if(countdownIntervals[item.id]) clearInterval(countdownIntervals[item.id]);
        let alerted={};
        const update=()=>{
            let remain = item.expiresAt - Date.now();
            if(remain<=0){
                if(timeSpan) timeSpan.textContent='已到期';
                if(card) card.classList.add('reserve-countdown-warning');
                clearInterval(countdownIntervals[item.id]);
                reserves = reserves.filter(r => r && r.id !== item.id);
                saveData();
                updateReserveUI();
                return;
            }
            let mins = Math.floor(remain/60000), secs = Math.floor((remain%60000)/1000);
            if(timeSpan) timeSpan.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
            if(remain <= 600000){
                if(card && !card.classList.contains('reserve-countdown-warning')) card.classList.add('reserve-countdown-warning');
                let minsLeft = Math.ceil(remain/60000);
                if(!alerted[minsLeft] && minsLeft<=10 && minsLeft>0){ 
                    alerted[minsLeft]=true; 
                    showToastAlert(item.name, minsLeft); 
                }
            } else { 
                if(card && card.classList.contains('reserve-countdown-warning')) card.classList.remove('reserve-countdown-warning'); 
            }
        };
        update(); 
        countdownIntervals[item.id] = setInterval(update,1000);
    }
    
    function startAllReserveCountdowns(){ 
        Object.keys(countdownIntervals).forEach(i=>clearInterval(countdownIntervals[i])); 
        setTimeout(()=>{ 
            document.querySelectorAll('.reserve-card').forEach(card=>{ 
                let id = parseInt(card.dataset.machineId); 
                let r = reserves.find(r => r && r.id === id); 
                if(r && r.expiresAt){ 
                    let t = card.querySelector('.time-big'); 
                    startReserveCountdown(r, card, t); 
                } 
            }); 
        }, 200); 
    }
    
    function bindEvents(){ 
        document.querySelectorAll('.flip-card').forEach(card=>{ 
            card.removeEventListener('click', handleFlip); 
            card.addEventListener('click', handleFlip); 
        }); 
        document.querySelectorAll('.sub-dot').forEach(dot=>{ 
            dot.removeEventListener('click', dot._h); 
            let h=(e)=>{ 
                e.stopPropagation(); 
                let idx = Array.from(dot.parentNode.children).indexOf(dot); 
                let parent = dot.closest('.flip-card'); 
                let pages = parent.querySelectorAll('.sub-page'); 
                pages.forEach((p,i)=>i===idx?p.classList.add('active'):p.classList.remove('active')); 
                parent.querySelectorAll('.sub-dot').forEach((d,i)=>i===idx?d.classList.add('active'):d.classList.remove('active')); 
            }; 
            dot._h = h; 
            dot.addEventListener('click', h); 
        }); 
    }
    
    function handleFlip(e){ 
        if(e.target.closest('button')) return; 
        let p1 = this.querySelector('.page-1'), p2 = this.querySelector('.page-2'); 
        if(p1.classList.contains('hidden')){ 
            p2.classList.add('hidden'); 
            p1.classList.remove('hidden'); 
        } else { 
            p1.classList.add('hidden'); 
            p2.classList.remove('hidden'); 
        } 
    }
    
    window.toggleFavorite = function(id){ 
        let m = machineDatabase.find(x => x.id === id); 
        if(!m) return; 
        let idx = favorites.findIndex(f => f && f.id === id); 
        if(idx > -1) favorites.splice(idx, 1); 
        else favorites.push({ ...m }); 
        saveData();
        updateFavoriteUI(); 
    };
    
    window.removeFromReserve = function(id, name){ 
        if(confirm(`確定離開「${name}」嗎？`)){ 
            reserves = reserves.filter(r => r && r.id !== id); 
            if(countdownIntervals[id]) clearInterval(countdownIntervals[id]); 
            saveData();
            updateReserveUI(); 
        } 
    };
    
    function updateCalc(){ 
        if(!currentSubData) return; 
        let tokens = parseInt(document.getElementById('confirmTokenInput').value)||0; 
        let cost = tokens * currentSubData.ratio; 
        let waste = tokens * POINT_DIFF; 
        let total = cost + waste; 
        let currentPoints = getCurrentPoints();
        let ok = true, msg = ''; 
        if(tokens < 50){ 
            msg = '⚠️ 最低50枚'; 
            ok = false;
        } else if(total > currentPoints){ 
            msg = `❌ 點數不足 需${formatPointsDecimal(total)}`; 
            ok = false;
        } 
        document.getElementById('warningMsg').innerHTML = msg ? `<span class="text-error">${msg}</span>` : ''; 
        document.getElementById('exchangeTokens').textContent = `${tokens} 枚`; 
        document.getElementById('costPoints').textContent = formatPointsInt(cost); 
        document.getElementById('wastePoints').textContent = formatPointsInt(waste); 
        document.getElementById('remainPoints').textContent = formatPointsDecimal(currentPoints - total); 
        let btn = document.getElementById('confirmOk'); 
        if(ok){ 
            btn.classList.remove('disabled-btn'); 
            btn.style.pointerEvents = 'auto'; 
        } else { 
            btn.classList.add('disabled-btn'); 
            btn.style.pointerEvents = 'none'; 
        } 
    }
    
    function showEnhancedLoading(machineName, machineId, targetUrl = 'simulator.html') {
        const loadingDiv = document.getElementById('hologramLoading');
        const loadingTitle = document.getElementById('loadingMachineTitle');
        if (loadingTitle) loadingTitle.textContent = `${machineName} NO.${machineId}`;
        if (loadingDiv) {
            const videoElem = document.getElementById('mascotVideo');
            if (videoElem) { videoElem.load(); videoElem.play().catch(e => console.log("影片播放被阻止")); }
            loadingDiv.classList.add('show');
            setTimeout(() => { window.location.href = targetUrl; }, 1900);
        } else { window.location.href = targetUrl; }
    }
    
    function doEnterGame(){ 
        if(!currentSubData) return; 
        let tokens = parseInt(document.getElementById('confirmTokenInput').value)||0; 
        if(tokens < 50){ 
            showMessage('⚠️ 兌換限制','最低50枚'); 
            return; 
        } 
        let total = tokens * currentSubData.ratio + tokens * POINT_DIFF; 
        let currentPoints = getCurrentPoints();
        if(total > currentPoints){ 
            showMessage('❌ 點數不足',''); 
            return; 
        } 
        const newPoints = currentPoints - total;
        if(window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.updatePoints(-total);
        } else {
            localStorage.setItem('t_pachin_points', newPoints);
        }
        
        let playedRecord = {
            id: currentSubData.machineId, 
            name: currentSubData.machineName,
            sub: machineDatabase.find(m => m.id === currentSubData.machineId)?.sub || '',
            ratio: currentSubData.ratio,
            bb: machineDatabase.find(m => m.id === currentSubData.machineId)?.bb || 0,
            rb: machineDatabase.find(m => m.id === currentSubData.machineId)?.rb || 0,
            curr: machineDatabase.find(m => m.id === currentSubData.machineId)?.curr || 0,
            total: machineDatabase.find(m => m.id === currentSubData.machineId)?.total || 0,
            playCount: 1, 
            playedDate: new Date().toISOString().slice(0, 10).replace(/-/g, '/')
        };
        currentRawPlayed.unshift(playedRecord);
        if(currentRawPlayed.length > 50) currentRawPlayed.pop();
        saveData();
        
        updatePointsDisplay(); 
        document.getElementById('subConfirmModal').classList.remove('show'); 
        let info = { name: currentSubData.machineName, ratio: currentSubData.ratio, machineId: currentSubData.machineId, coins: tokens, pointDiff: POINT_DIFF }; 
        localStorage.setItem('t_pachin_machine_info', JSON.stringify(info)); 
        
        showEnhancedLoading(currentSubData.machineName, currentSubData.machineId);
    }
    
    window.openSubConfirm = function(name, id, ratio){ 
        currentSubData = { machineName: name, machineId: id, ratio: parseFloat(ratio) }; 
        const currentPoints = getCurrentPoints();
        document.getElementById('confirmMachineName').textContent = name; 
        document.getElementById('confirmSubName').textContent = id + '號機'; 
        document.getElementById('confirmRatio').textContent = ratio; 
        document.getElementById('pointDiffDisplay').textContent = POINT_DIFF.toFixed(2);
        document.getElementById('confirmPoints').textContent = formatPointsDecimal(currentPoints); 
        document.getElementById('remainPoints').textContent = formatPointsDecimal(currentPoints); 
        document.getElementById('confirmTokenInput').value = 100; 
        updateCalc(); 
        document.getElementById('subConfirmModal').classList.add('show'); 
    };
    
    function initAllData() {
        if(window.T_PACHIN_STORAGE){
            favorites = T_PACHIN_STORAGE.getFavorites() || [];
            reserves = T_PACHIN_STORAGE.getReserves() || [];
            currentRawPlayed = T_PACHIN_STORAGE.getPlayed() || [];
            updatePointsDisplay();
        } else {
            loadData();
        }
        updateFavoriteUI(); 
        updateReserveUI(); 
        applyPlayedFilter(); 
        startAllReserveCountdowns();
    }
    
    // 導航連動 - 大廳連到 lobby.html
    document.querySelectorAll('.nav-item, .logo, .combo-announce-btn').forEach(el => {
        el.addEventListener('click', (e) => {
            e.preventDefault();
            let page = el.dataset.page;
            if(page === 'index') {
                window.location.href = 'index.html';
            } else if(page === 'lobby') {
                window.location.href = 'lobby.html';
            } else if(page === 'machines') {
                window.location.href = 'machines.html';
            } else if(page === 'news') {
                window.location.href = 'news.html';
            } else if(page === 'about') {
                window.location.href = 'about.html';
            }
        });
    });
    
    document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            let target = this.dataset.tab;
            document.querySelectorAll('.category-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(target + '-section').classList.remove('hidden');
        });
    });
    
    document.getElementById('playedDaysFilter')?.addEventListener('change', e => {
        currentFilterDays = parseInt(e.target.value);
        applyPlayedFilter();
    });
    
    document.getElementById('confirmOk')?.addEventListener('click', doEnterGame);
    document.getElementById('confirmCancelBtn')?.addEventListener('click', () => document.getElementById('subConfirmModal').classList.remove('show'));
    document.getElementById('closeXBtn')?.addEventListener('click', () => document.getElementById('subConfirmModal').classList.remove('show'));
    document.getElementById('confirmTokenInput')?.addEventListener('input', updateCalc);
    
    // 同步暱稱
    if(window.T_PACHIN_STORAGE){
        document.getElementById('nicknameDisplay').textContent = T_PACHIN_STORAGE.getNickname();
        window.addEventListener('t-pachin:user-updated', (e) => {
            if(e.detail && e.detail.nickname) {
                document.getElementById('nicknameDisplay').textContent = e.detail.nickname;
            }
            if(e.detail && e.detail.points !== undefined) {
                updatePointsDisplay();
            }
        });
    } else {
        let savedNick = localStorage.getItem('t_pachin_nickname');
        if(savedNick) document.getElementById('nicknameDisplay').textContent = savedNick;
    }
    
    initAllData();
    setTimeout(() => updatePointsDisplay(), 100);
})();
</script>
</body>
</html>
