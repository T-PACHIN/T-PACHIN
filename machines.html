    function bindSwipeToClose(toast) {
        if (!toast) return;
        let isDragging = false;
        let startY = 0;
        let currentTranslateY = 0;
        
        const onTouchStart = (e) => {
            isDragging = true;
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            currentTranslateY = 0;
            toast.style.transition = 'none';
            e.preventDefault();
        };
        
        const onTouchMove = (e) => {
            if (!isDragging) return;
            const currentY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaY = currentY - startY;
            if (deltaY < 0) {
                currentTranslateY = deltaY;
                toast.style.transform = `translateX(-50%) translateY(${deltaY}px)`;
                toast.style.opacity = Math.max(0, 1 + deltaY / 100);
            }
            e.preventDefault();
        };
        
        const onTouchEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            toast.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
            if (currentTranslateY < -50) {
                toast.style.transform = 'translateX(-50%) translateY(-100px)';
                toast.style.opacity = '0';

            } else {
                toast.style.transform = 'translateX(-50%) translateY(0)';
                toast.style.opacity = '1';
            }
            currentTranslateY = 0;
            e.preventDefault();
        };
        
        const onMouseDown = (e) => {
            e.preventDefault();
            onTouchStart(e);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        };
        
        const onMouseMove = (e) => { onTouchMove(e); };
        const onMouseUp = (e) => {
            onTouchEnd(e);
            window.removeEventListener('mousemove', onMouseMove);
            window.removeEventListener('mouseup', onMouseUp);
        };
        
        toast.addEventListener('touchstart', onTouchStart, { passive: false });
        toast.addEventListener('touchmove', onTouchMove, { passive: false });
        toast.addEventListener('touchend', onTouchEnd);
        toast.addEventListener('mousedown', onMouseDown);

                    cardElement.classList.add('reserve-countdown-warning');
                }
                if (!hasShown10 && remaining <= 600000 && remaining > 480000) {
                    hasShown10 = true; showToastAlert(reserveItem.name, '10');
                } else if (!hasShown8 && remaining <= 480000 && remaining > 360000) {
                    hasShown8 = true; showToastAlert(reserveItem.name, '8');
                } else if (!hasShown6 && remaining <= 360000 && remaining > 240000) {
                    hasShown6 = true; showToastAlert(reserveItem.name, '6');
                } else if (!hasShown4 && remaining <= 240000 && remaining > 120000) {
                    hasShown4 = true; showToastAlert(reserveItem.name, '4');
                } else if (!hasShown2 && remaining <= 120000) {
                    hasShown2 = true; showToastAlert(reserveItem.name, '2');
                }
            } else {
                if (cardElement && cardElement.classList.contains('reserve-countdown-warning')) {
                    cardElement.classList.remove('reserve-countdown-warning');
                }
            }
        };
        updateCountdown();
        countdownIntervals[reserveItem.id] = setInterval(updateCountdown, 1000);
    }
    
    function startAllReserveCountdowns() {
        Object.keys(countdownIntervals).forEach(id => {
            clearInterval(countdownIntervals[id]);
            delete countdownIntervals[id];
        });
        setTimeout(() => {
            document.querySelectorAll('.reserve-card').forEach(card => {
                const machineId = parseInt(card.getAttribute('data-machine-id'));
                const reserveItem = reserves.find(r => r.id === machineId);
                if (reserveItem && reserveItem.expiresAt) {
                    const timeElement = card.querySelector('.time-big');
                    startReserveCountdown(reserveItem, card, timeElement);
                }
            });
        }, 100);
    }
    
    function createCardHTML(item, type) {
        const isFav = favorites.some(f => f && f.id === item.id);
        let topRow = '';
        if (type === 'reserve') {
            topRow = `<div class="page1-reserve-row"><span class="reserve-text">⏰ 保留倒數</span><span class="time-big">${item.reserveTime || '10:00'}</span></div>`;
        } else if (type === 'played') {
            topRow = `<div class="page1-played-row"><span class="played-text">玩過 ${item.playCount || 1}次</span><span class="played-date">${item.playedDate || '2026/04/09'}</span></div>`;
        }
        const machineImage = item.image || 'https://i.pinimg.com/736x/c3/72/db/c372db1b020ebf778ef707f63c122bf7.jpg';
        
        return `<div class="flip-card ${type}-card" data-machine-id="${item.id}">
            <div class="page page-1">
                <div class="page1-row1"><div class="model-name"><strong>NO.${item.id}</strong> ${item.name} <span style="color:#aac9ff;">${item.sub || ''}</span></div><span class="ratio-mini">每枚${item.ratio}</span></div>
                ${topRow}
                <div class="stats-grid"><div class="stat-cell"><div class="stat-label">BB</div><div class="stat-number bb-number">${item.bb || 1200}</div></div><div class="stat-cell"><div class="stat-label">RB</div><div class="stat-number rb-number">${item.rb || 600}</div></div><div class="stat-cell"><div class="stat-label">當前</div><div class="stat-number curr-number">${item.curr || 280}</div></div><div class="stat-cell"><div class="stat-label">總回</div><div class="stat-number total-number">${item.total || 4000}</div></div></div>
            </div>
            <div class="page page-2 hidden">
                <div class="sub-page active">${generateMiniCards(miniCardsData)}</div>
                <div class="sub-page">${generateMiniCards(miniCardsData2)}</div>
                <div class="sub-page-indicator">
                    <span class="sub-dot active"></span>
                    <span class="sub-dot"></span>
                </div>
            </div>
            <div class="card-actions">
                <button class="enter-btn" onclick="window.openSubConfirm('${item.name.replace(/'/g, "\\'")}', ${item.id}, '${item.ratio}')">進入遊戲</button>
                ${type === 'reserve' ? `<button class="leave-btn" onclick="window.removeFromReserve(${item.id}, '${item.name.replace(/'/g, "\\'")}')">離開</button>` : ''}
                <button class="favorite-btn ${isFav ? 'active' : 'inactive'}" onclick="window.toggleFavorite(${item.id})"><i class="fa ${isFav ? 'fa-heart' : 'fa-heart-o'}"></i></button>
            </div>
        </div>`;
    }
    
    function bindSubPageSwitches() {
        document.querySelectorAll('.flip-card').forEach(card => {
            const subDots = card.querySelectorAll('.sub-dot');
            subDots.forEach((dot, idx) => {
                dot.removeEventListener('click', dot._handler);
                const handler = function(e) {
                    e.stopPropagation();
                    const subPages = card.querySelectorAll('.sub-page');
                    subPages.forEach((p, i) => {
                        if (i === idx) p.classList.add('active');
                        else p.classList.remove('active');
                    });
                    card.querySelectorAll('.sub-dot').forEach((d, i) => {
                        if (i === idx) d.classList.add('active');
                        else d.classList.remove('active');
                    });
                };
                dot._handler = handler;
                dot.addEventListener('click', handler);
            });
        });
    }
    
    function updateFavoriteUI() { 
        let container = document.getElementById('favoriteContainer');
        let countSpan = document.getElementById('favoriteCount');
        let noMsg = document.getElementById('noFavoriteMsg');
        countSpan.textContent = favorites.length + ' 台';
        if(favorites.length === 0){ 
            container.innerHTML = ''; 
            noMsg.classList.remove('hidden'); 
        } else { 
            noMsg.classList.add('hidden'); 
            container.innerHTML = favorites.map(m => createCardHTML(m, 'favorite')).join(''); 
        } 
        bindFlipEvents();
        bindSubPageSwitches();
    }
    
    function updateReserveUI() { 
        let container = document.getElementById('reserveContainer');
        let countSpan = document.getElementById('reserveCount');
        let noMsg = document.getElementById('noReserveMsg');
        countSpan.textContent = reserves.length + ' 台';
        if(reserves.length === 0){ 
            container.innerHTML = ''; 
            noMsg.classList.remove('hidden'); 
        } else { 
            noMsg.classList.add('hidden'); 
            container.innerHTML = reserves.map(m => createCardHTML(m, 'reserve')).join(''); 
        } 
        bindFlipEvents();
        bindSubPageSwitches();
        startAllReserveCountdowns();
    }
    
    function updatePlayedUI() { 
        let container = document.getElementById('playedContainer');
        let countSpan = document.getElementById('playedCount');
        let noMsg = document.getElementById('noPlayedMsg');
        countSpan.textContent = played.length + ' 台';
        if(played.length === 0){ 
            container.innerHTML = ''; 
            noMsg.classList.remove('hidden'); 
        } else { 
            noMsg.classList.add('hidden'); 
            container.innerHTML = played.map(m => createCardHTML(m, 'played')).join(''); 
        } 
        bindFlipEvents();
        bindSubPageSwitches();
    }
    
    function bindFlipEvents() { 
        document.querySelectorAll('.flip-card').forEach(card => { 
            card.removeEventListener('click', handleCardClick); 
            card.addEventListener('click', handleCardClick); 
        }); 
    }
    
    function handleCardClick(e) { 
        if(e.target.closest('button')) return; 
        const p1 = this.querySelector('.page-1'), p2 = this.querySelector('.page-2'); 
        if(!p1 || !p2) return; 
        if(!p1.classList.contains('hidden')){ 
            p1.classList.add('hidden'); 
            p2.classList.remove('hidden'); 
        } else { 
            p2.classList.add('hidden'); 
            p1.classList.remove('hidden'); 
        } 
    }
    
    // ==================== 收藏/保留操作 ====================
    window.toggleFavorite = function(id) {
        const machine = machineDatabase.find(m => m.id === id);
        if (!machine) return;
        if (window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.toggleFavorite(machine);
            favorites = T_PACHIN_STORAGE.getFavorites();
        } else {
            const isFav = favorites.some(f => f.id === id);
            if (isFav) favorites = favorites.filter(f => f.id !== id);
            else favorites.push(machine);
        }
        updateFavoriteUI();
        const isNowFav = favorites.some(f => f.id === id);
        showMessage(isNowFav ? '❤️ 加入收藏' : '💔 取消收藏', `${machine.name} 已${isNowFav ? '加入' : '移除'}收藏`);
    };
    
    window.removeFromReserve = function(id, name) {
        if (confirm(`確定要離開「${name}」嗎？`)) {
            if (window.T_PACHIN_STORAGE) {
                T_PACHIN_STORAGE.removeReserve(id);
                reserves = T_PACHIN_STORAGE.getReserves();
            } else {
                reserves = reserves.filter(r => r.id !== id);
            }
            if (countdownIntervals[id]) {
                clearInterval(countdownIntervals[id]);
                delete countdownIntervals[id];
            }
            updateReserveUI();
            showMessage('✅ 已離開', `${name} 已從保留中移除`);
        }
    };
    
    // ==================== 進入遊戲彈窗 ====================
    window.openSubConfirm = function(machineName, machineId, ratio) {
        currentSubData = { machineName, machineId, ratio: parseFloat(ratio) };
        document.getElementById('confirmMachineName').textContent = machineName;
        document.getElementById('confirmSubName').textContent = machineId + '號機';
        document.getElementById('confirmRatio').textContent = ratio;
        document.getElementById('confirmPoints').textContent = userPoints.toLocaleString();
        document.getElementById('confirmTokenInput').value = 1000;
        updateRemainAndCoins();
        document.getElementById('subConfirmModal').classList.add('show');
    };
    
    function updateRemainAndCoins() {
        const inputEl = document.getElementById('confirmTokenInput');
        if (!inputEl || !currentSubData) return;
        let inputPoints = parseInt(inputEl.value) || 0;
        if (inputPoints < 0) inputPoints = 0;
        if (inputPoints > userPoints) { inputPoints = userPoints; inputEl.value = inputPoints; }
        let coins = Math.floor(inputPoints / currentSubData.ratio);
        document.getElementById('exchangeTokens').textContent = `${coins} 枚`;
        let remain = userPoints - inputPoints;
        if (remain < 0) remain = 0;
        document.getElementById('confirmTokenRemain').innerHTML = `<i class="fa fa-credit-card"></i> 剩餘點數: ${remain.toLocaleString()}`;
    }
    
    function doEnterGame() {
        if (!currentSubData) return;
        const inputPoints = parseInt(document.getElementById('confirmTokenInput').value) || 0;
        if (inputPoints <= 0) { showMessage('⚠️ 兌換限制', '請輸入要兌換的點數'); return; }
        if (inputPoints < 50) { showMessage('⚠️ 兌換限制', '最低兌換 50 點數'); return; }
        if (inputPoints > userPoints) { showMessage('❌ 點數不足', '您的點數不足'); return; }
        const coins = Math.floor(inputPoints / currentSubData.ratio);
        if (coins === 0) { showMessage('⚠️ 兌換限制', '點數不足以兌換 1 枚代幣'); return; }
        
        if (window.T_PACHIN_STORAGE) {
            userPoints = T_PACHIN_STORAGE.updatePoints(-inputPoints);
        } else {
            userPoints -= inputPoints;
        }
        updatePointsDisplay();
        
        document.getElementById('subConfirmModal').classList.remove('show');
        showLoadingAndGoToSimulator(currentSubData.machineName, currentSubData.machineId, currentSubData.ratio);
    }
    
    function updatePointsDisplay() {
        const tokenBtn = document.getElementById('tokenBtn');
        if (tokenBtn) tokenBtn.textContent = userPoints.toLocaleString();
        const confirmPoints = document.getElementById('confirmPoints');
        if (confirmPoints) confirmPoints.textContent = userPoints.toLocaleString();
        if (document.getElementById('confirmTokenRemain') && currentSubData) {
            updateRemainAndCoins();
        }
        // 同步到 shared.js
        if (window.T_PACHIN_STORAGE && userPoints !== T_PACHIN_STORAGE.getPoints()) {
            T_PACHIN_STORAGE.setPoints(userPoints);
        }
    }
    
    // ==================== 標籤切換 ====================
    document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            const target = this.dataset.tab;
            document.querySelectorAll('.category-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(target + '-section').classList.remove('hidden');
        });
    });
    
    // ==================== 點數同步事件 ====================
    function bindStorageEvents() {
        if (!window.T_PACHIN_STORAGE) return;
        window.addEventListener('points-updated', function(e) {
            if (e.detail && e.detail.points !== undefined) {
                userPoints = e.detail.points;
                updatePointsDisplay();
            }
        });
        window.addEventListener('t-pachin:favorites-updated', function(e) {
            favorites = e.detail;
            updateFavoriteUI();
        });
        window.addEventListener('t-pachin:reserves-updated', function(e) {
            reserves = e.detail;
            updateReserveUI();
            startAllReserveCountdowns();
        });
        window.addEventListener('t-pachin:played-updated', function(e) {
            played = e.detail;
            updatePlayedUI();
        });
    }
    
    // ==================== 初始化 ====================
    function init() {
        initNavigation();
        initAllData();
        bindStorageEvents();
        updateFavoriteUI();
        updateReserveUI();
        updatePlayedUI();
        
        if (window.T_PACHIN_STORAGE) {
            document.getElementById('nicknameDisplay').textContent = T_PACHIN_STORAGE.getNickname();
        }
        
        document.getElementById('confirmOk')?.addEventListener('click', doEnterGame);
        document.getElementById('confirmCancelBtn')?.addEventListener('click', () => {
            document.getElementById('subConfirmModal').classList.remove('show');
        });
        document.getElementById('closeXBtn')?.addEventListener('click', () => {
            document.getElementById('subConfirmModal').classList.remove('show');
        });
        
        const tokenInput = document.getElementById('confirmTokenInput');
        if (tokenInput) {
            tokenInput.addEventListener('input', updateRemainAndCoins);
        }
    }
    
    init();
})();
</script>
</body>
</html>
