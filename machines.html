<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;500;700;900&family=Noto+Sans+JP:wght@300;500;700;900&family=Russo+One&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0c1a; color: #fff; font-family: 'Noto Sans JP', 'Noto Sans TC', 'Orbitron', sans-serif; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        body.light-mode { background: #e8ecf2; color: #1a1a2e; }
        body.light-mode .max-w-md { background: linear-gradient(145deg, #f0f2f8, #e8ecf2); }
        body.light-mode .metal-header { background: linear-gradient(145deg, #dce0e8, #d0d4e0); border-bottom-color: #4a80c0; }
        body.light-mode .points-display { background: linear-gradient(145deg, #e0d6b0, #d0c6a0); color: #1a1a2e; border-color: #c9a03d; text-shadow: none; }
        body.light-mode .nickname-display { color: #1a1a2e; text-shadow: none; }
        body.light-mode .bottom-nav { background: linear-gradient(145deg, #dce0e8, #d0d4e0); }
        body.light-mode .nav-item { background: linear-gradient(145deg, #e0e4ec, #d0d4e0); color: #2a4055; text-shadow: none; }
        body.light-mode .nav-item.current-page { background: linear-gradient(145deg, #c0c8d8, #b0b8c8); color: #1a1a2e; }
        body.light-mode .category-tab { background: linear-gradient(145deg, #e0e4ec, #d0d4e0); color: #2a4055; }
        body.light-mode .category-tab.active { background: linear-gradient(145deg, #c0c8d8, #b0b8c8); color: #1a1a2e; }
        body.light-mode .flip-card { background: linear-gradient(145deg, #ffffff, #f5f7fa); }
        body.light-mode .sub-confirm-content { background: linear-gradient(145deg, #ffffff, #f0f2f8); }
        body.light-mode .info-grid { background: linear-gradient(145deg, #e0e4ec, #d0d4e0); }
        body.light-mode .info-label { color: #2a4055; }
        body.light-mode .info-value { color: #1a1a2e; }
        body.light-mode .sub-confirm-header h3 { -webkit-text-fill-color: #1a1a2e; background: none; color: #1a1a2e; }
        body.light-mode .stat-cell { background: linear-gradient(145deg, #e0e4ec, #d0d4e0); }
        body.light-mode .stat-label { color: #2a4055; }
        body.light-mode .model-name { color: #1a1a2e; }
        body.light-mode .model-name strong { color: #1a1a2e; }
        body.light-mode .ratio-mini { background: linear-gradient(145deg, #e0e4ec, #d0d4e0); color: #1a1a2e; }
        
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(74, 128, 192, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(153, 0, 255, 0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        
        ::-webkit-scrollbar { width: 4px; height: 0px; background: transparent; }
        ::-webkit-scrollbar-track { background: rgba(74, 128, 192, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(74, 128, 192, 0.5); border-radius: 10px; }
        * { scrollbar-width: thin; scrollbar-color: #4a80c0 rgba(74, 128, 192, 0.2); }
        
        .max-w-md { 
            max-width: 448px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 1; 
            background: linear-gradient(145deg, #0f1425, #0a0e1f); 
            box-shadow: 0 0 50px rgba(74, 128, 192, 0.2); 
            border-left: 1px solid rgba(74, 128, 192, 0.2); border-right: 1px solid rgba(153, 0, 255, 0.2); 
            display: flex; flex-direction: column; padding-top: 110px; padding-bottom: 80px;
        }
        
        .metal-header { 
            position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 448px;
            background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border-bottom: 2px solid #4a80c0; border-top: 2px solid #4a80c0;
            box-shadow: 0 5px 0 #0f121c, 0 10px 15px rgba(74, 128, 192, 0.3), inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 8px rgba(0,0,0,0.6);
            overflow: hidden; border-radius: 0 0 30px 30px; padding: 0.75rem 1rem; z-index: 100;
        }
        .metal-header::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: skewX(-20deg);
            animation: shine 4s infinite; pointer-events: none;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 120%; } 100% { left: 120%; } }
        
        .logo { display: flex; align-items: center; gap: 8px; font-family: 'Orbitron','Russo One',sans-serif; cursor: pointer; transition: transform 0.2s ease; text-decoration: none; color: inherit; }
        .logo:active { transform: scale(0.97); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #000, #111, #222); border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(74,128,192,0.5), inset 0 0 10px rgba(255,215,0,0.2); overflow: hidden; border: 2px solid #ffd700; }
        .logo-icon::before { content: ''; position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, #4a80c0, #c90a0a, #ffd700, transparent); animation: logoRotate 4s linear infinite; }
        .logo-icon::after { content: ''; position: absolute; width: 30px; height: 30px; background: #000; border-radius: 8px; }
        @keyframes logoRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-icon-inner { position: relative; z-index: 2; font-size: 16px; font-weight: 900; background: linear-gradient(45deg, #ffdf00, #ffec8b, #4a80c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
        .logo-main { font-size: 18px; font-weight: 900; background: linear-gradient(45deg, #ffdf00, #ffd700, #4a80c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: textShine 3s ease-in-out infinite alternate; }
        .logo-sub { font-size: 9px; color: #4a80c0; font-weight: 500; letter-spacing: 0.8px; text-shadow: 0 0 4px rgba(74, 128, 192, 0.5); }
        @keyframes textShine { from { filter: brightness(1); } to { filter: brightness(1.2); text-shadow: 0 0 10px #ffd700; } }
        
        .nickname-display { color: #ffffff; text-shadow: 0 2px 3px black, 0 0 10px rgba(255,255,255,0.3); font-weight: 600; transition: all 0.2s ease; font-size: 1.3rem; line-height: 1.3; margin-bottom: 4px; letter-spacing: 0.5px; text-decoration: none; cursor: pointer; }
        .nickname-display:hover { color: #ffd966; text-shadow: 0 0 10px #ffd700, 0 2px 3px black; }
        
        .points-display { background: linear-gradient(145deg, #4a3a1a, #3a2a0a); padding: 0.15rem 1.5rem; border-radius: 30px; box-shadow: inset 0 2px 5px rgba(255,215,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.6), 0 4px 0 #2a1f0a, 0 0 12px #ffd700; border: 1px solid #ffd700; color: #ffd966; font-weight: 900; font-size: 1.1rem; text-shadow: 0 2px 3px black; cursor: pointer; transition: all 0.1s ease; line-height: 1.3; min-width: 100px; text-align: center; }
        
        .announcement-combo { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border: 1px solid #4a80c0; border-radius: 40px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.75rem; margin: 0.5rem 0; }
        .combo-announce-btn { background: linear-gradient(145deg, #3a5065, #2a4055); border: 1px solid #4a80c0; color: white; border-radius: 30px; padding: 0.25rem 1rem; display: flex; align-items: center; gap: 0.25rem; font-size: 0.8rem; font-weight: bold; cursor: pointer; text-decoration: none; }
        .marquee-container { flex: 1; overflow: hidden; position: relative; height: 24px; mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent); }
        .marquee-content { display: inline-block; white-space: nowrap; color: #b3e4ff; font-size: 0.8rem; animation: marquee 15s linear infinite; padding-left: 20px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .category-tabs-container { display: flex; justify-content: center; gap: 1rem; padding: 0.8rem 0; width: 100%; }
        .category-tab { background: linear-gradient(145deg, #3a4050, #2a2f40); border: 1px solid #4a80c0; border-radius: 30px; padding: 0.6rem 1.2rem; font-size: 0.9rem; color: #b0c4de; transition: all 0.1s ease; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 5px rgba(0,0,0,0.4), 0 5px 0 #0f121c; }
        .category-tab.active { background: linear-gradient(145deg, #4a5065, #3a4055); color: white; border: 1px solid #4a80c0; box-shadow: 0 0 15px #4a80c0, inset 0 2px 8px rgba(255,255,255,0.6), inset 0 -3px 8px rgba(0,0,0,0.4), 0 5px 0 #0f121c; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 2px solid #4a80c0; padding-bottom: 0.3rem; flex-wrap: wrap; gap: 8px; }
        .section-title { font-size: 1.1rem; color: #fff; font-weight: 700; text-shadow: 0 0 10px #4a80c0; }
        .section-count { font-size: 0.8rem; background: linear-gradient(145deg, #3a4050, #2a2f40); padding: 0.2rem 0.8rem; border-radius: 30px; border: 1px solid #4a80c0; color: #ffd966; }
        .filter-select-wrapper {
            background: linear-gradient(145deg, #2a2f3f, #1a1f2f);
            border-radius: 40px;
            padding: 0.2rem 0.4rem;
            border: 1px solid #4a80c0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .filter-select-wrapper i {
            font-size: 0.8rem;
            color: #ffd966;
            margin-left: 6px;
        }
        .played-filter-select {
            background: #0a0e1f;
            border: none;
            color: #ffd966;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            outline: none;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
        }
        .played-filter-select option {
            background: #1a1f2f;
            color: #ffeca2;
        }
        
        /* 保留倒數警示樣式 */
        .reserve-countdown-warning { 
            animation: pulseRed 1s infinite !important; 
            background: linear-gradient(145deg, #7a2a2a, #5a1a1a) !important; 
            border-color: #ff4444 !important; 
            box-shadow: 0 0 12px rgba(255,68,68,0.8), inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -3px 8px rgba(0,0,0,0.6), 0 8px 0 #3a0a0a !important;
        }
        @keyframes pulseRed { 
            0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4), inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -3px 8px rgba(0,0,0,0.6); border-color: #ff6666; } 
            50% { box-shadow: 0 0 0 6px rgba(255,68,68,0.6), inset 0 2px 8px rgba(255,255,255,0.4), inset 0 -3px 8px rgba(0,0,0,0.6); border-color: #ff4444; } 
            100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4), inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -3px 8px rgba(0,0,0,0.6); border-color: #ff8888; }
        }
        
        .flip-card { background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border: 2px solid #4a80c0; border-radius: 24px; transition: all 0.2s ease; box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 8px rgba(0,0,0,0.6), 0 8px 0 #0f121c; cursor: pointer; width: 100%; padding: 1rem 0.9rem 0.8rem 0.9rem; margin-bottom: 1.5rem; }
        .flip-card:hover { transform: translateY(-5px); box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 8px rgba(0,0,0,0.6), 0 13px 0 #0f121c; }
        .flip-card:active { transform: translateY(4px); box-shadow: inset 0 5px 10px rgba(0,0,0,0.7), inset 0 -2px 5px rgba(255,255,255,0.2), 0 4px 0 #0f121c; }
        
        .page1-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .model-name { font-size: 1rem; font-weight: 700; color: #ffdb8e; flex: 1; }
        .model-name strong { font-size: 1.15rem; font-weight: 900; color: white; margin-right: 4px; background: rgba(0,0,0,0.3); padding: 0 4px; border-radius: 4px; }
        .ratio-mini { font-size: 0.9rem; font-weight: 700; background: linear-gradient(145deg, #3a4050, #2a2f40); padding: 0.2rem 0.8rem; border-radius: 30px; border: 1px solid #4a80c0; color: #ffeca2; margin-left: 6px; display: inline-flex; align-items: center; gap: 6px; }
        .point-diff-badge-mini { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 2px 6px; font-size: 0.6rem; color: #7ec8ff; letter-spacing: 0.3px; font-weight: normal; }
        
        .page1-reserve-row { display: flex; align-items: center; gap: 0.8rem; background: linear-gradient(145deg, #2a3a4f, #1a2a3f); border-radius: 40px; padding: 0.2rem 1.2rem; border: 2px solid #e5a73e; width: fit-content; margin: 0.3rem 0 1rem 0; }
        .reserve-text { font-size: 0.9rem; font-weight: 700; color: #f6c445; }
        .time-big { font-family: 'Orbitron', monospace; font-size: 1.3rem; font-weight: 800; color: #ffbc5c; }
        
        .page1-played-row { display: flex; align-items: center; gap: 0.8rem; background: linear-gradient(145deg, #1a3a4d, #0a2a3f); border-radius: 40px; padding: 0.2rem 1.2rem; border: 2px solid #4a9eff; width: fit-content; margin: 0.3rem 0 1rem 0; }
        .played-text { font-size: 0.9rem; font-weight: 700; color: #7ac7ff; }
        .played-date { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: #a0d0ff; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin: 0.8rem 0; }
        .stat-cell { background: linear-gradient(145deg, #1a2a3a, #0a1a2a); border: 1px solid #4a80c0; border-radius: 20px; padding: 0.5rem 0.2rem; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #9ac2f0; }
        .stat-number { font-size: 1.2rem; font-weight: 900; font-family: 'Orbitron'; }
        .bb-number { color: #ff7b7b; }
        .rb-number { color: #73d98e; }
        .curr-number { color: #7ec8ff; }
        .total-number { color: #fad05b; }
        
        .mini-cards-row { display: flex; gap: 5px; justify-content: space-between; padding: 6px 0; flex-wrap: nowrap; overflow-x: auto; width: 100%; scrollbar-width: thin; }
        .mini-cards-row::-webkit-scrollbar { height: 3px; }
        .mini-cards-row::-webkit-scrollbar-track { background: rgba(74, 128, 192, 0.1); border-radius: 10px; }
        .mini-cards-row::-webkit-scrollbar-thumb { background: #4a80c0; border-radius: 10px; }
        .mini-card { flex: 1; min-width: 35px; background: linear-gradient(145deg, #0e1a2a, #061016); border: 1px solid #4a80c0; border-radius: 8px; padding: 5px 2px; text-align: center; box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 1px 2px rgba(0,0,0,0.2); }
        .mini-card .card-number { font-size: 0.6rem; font-weight: 800; color: #ffd966; margin-bottom: 4px; text-shadow: 0 1px 2px black; }
        .mini-card .card-bars { display: flex; flex-direction: column-reverse; gap: 2px; min-height: 20px; margin-bottom: 4px; }
        .mini-card .card-bar-segment { width: 100%; height: 4px; border-radius: 2px; background: #2a4055; }
        .mini-card .card-bar-segment.filled-red { background: linear-gradient(90deg, #ff5555, #cc0000); box-shadow: 0 0 1px #ff5555; }
        .mini-card .card-bar-segment.filled-green { background: linear-gradient(90deg, #55ff55, #00aa00); box-shadow: 0 0 1px #55ff55; }
        .mini-card .card-value { font-size: 0.55rem; font-weight: 700; color: #ffd966; font-family: 'Orbitron', monospace; text-shadow: 0 1px 2px black; }
        
        .sub-page { display: none; }
        .sub-page.active { display: block; }
        .sub-page-indicator { display: flex; justify-content: center; gap: 6px; margin: 6px 0; }
        .sub-dot { width: 6px; height: 6px; border-radius: 50%; background: #3a4050; border: 1px solid #4a80c0; cursor: pointer; transition: all 0.1s; }
        .sub-dot.active { background: #ffd700; transform: scale(1.2); }
        
        .card-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; align-items: center; }
        .enter-btn, .leave-btn { background: linear-gradient(145deg, #3a5065, #2a4055); border: 1px solid #4a80c0; color: white; font-size: 0.85rem; font-weight: 700; padding: 0.4rem 0.6rem; border-radius: 30px; flex: 2; text-align: center; cursor: pointer; box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 5px rgba(0,0,0,0.4), 0 5px 0 #0f121c; }
        .enter-btn:active, .leave-btn:active { transform: translateY(3px); box-shadow: inset 0 5px 8px rgba(0,0,0,0.6), inset 0 -2px 5px rgba(255,255,255,0.2), 0 2px 0 #0f121c; }
        .leave-btn { background: linear-gradient(145deg, #653a3a, #552a2a); border-color: #ff6666; }
        .favorite-btn { width: 36px; height: 36px; background: linear-gradient(145deg, #3a4050, #2a2f40); border: 1px solid #4a80c0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), inset 0 -3px 5px rgba(0,0,0,0.4), 0 5px 0 #0f121c; }
        .favorite-btn.active { background: linear-gradient(145deg, #653a5a, #552a4a); border-color: #ff69b4; box-shadow: 0 0 15px #ff69b4; }
        .favorite-btn.active i { color: #ff69b4; }
        .favorite-btn.inactive i { color: #9ca3af; }
        
        .bottom-nav { width: 100%; max-width: 448px; padding: 0.6rem 1rem; background: linear-gradient(145deg, #2a2f3f, #1a1f2f); border-top: 2px solid #4a80c0; border-bottom: 2px solid #4a80c0; border-radius: 30px 30px 30px 30px; box-shadow: 0 -5px 15px rgba(74, 128, 192, 0.3), 0 8px 10px rgba(0, 0, 0, 0.6), inset 0 2px 5px rgba(255, 255, 255, 0.3), inset 0 -3px 8px rgba(0, 0, 0, 0.6); position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; justify-content: space-between; align-items: flex-end; overflow: visible; }
        .bottom-nav::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); transform: skewX(-20deg); animation: shine 4s infinite; pointer-events: none; }
        
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; padding: 0.5rem 0.6rem; border-radius: 20px; text-decoration: none; outline: none; background: linear-gradient(145deg, #3a4050, #2a2f40); box-shadow: 0 5px 0 #0f121c, inset 0 2px 5px rgba(255, 255, 255, 0.3), inset 0 -3px 5px rgba(0, 0, 0, 0.3); text-shadow: 0 2px 3px rgba(0, 0, 0, 0.5); border: 1px solid rgba(74, 128, 192, 0.2); color: #b0c4de; transition: all 0.1s ease; font-family: 'Noto Sans TC', 'Noto Sans JP', 'Orbitron', sans-serif; flex: none; min-width: 50px; cursor: pointer; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 2px; filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.5)); }
        .nav-item span { font-weight: 700; letter-spacing: 0.5px; font-size: 0.7rem; }
        .nav-item:active { transform: translateY(3px); box-shadow: 0 2px 0 #0f121c, inset 0 5px 8px rgba(0, 0, 0, 0.5), inset 0 -2px 5px rgba(255, 255, 255, 0.2); color: #4a80c0; }
        .nav-item.current-page { background: linear-gradient(145deg, #4a5065, #3a4055); box-shadow: 0 5px 0 #0f121c, 0 10px 15px rgba(74, 128, 192, 0.5), inset 0 2px 8px rgba(255, 255, 255, 0.6), inset 0 -3px 8px rgba(0, 0, 0, 0.4); color: white; border: 1px solid #4a80c0; transform: scale(1.05); text-shadow: 0 0 8px #4a80c0; }
        
        .nav-item.lobby-special {
            background: linear-gradient(145deg, #9b4dff, #6a1b9a, #4a0080);
            transform: translateY(-28px) scale(1.1);
            box-shadow: 0 10px 0 #2a004d, 0 18px 25px rgba(0, 0, 0, 0.5), inset 0 2px 12px rgba(255, 255, 255, 0.4), inset 0 -4px 8px rgba(0, 0, 0, 0.3), 0 0 20px #bf5eff, 0 0 8px #7c3aed;
            color: #ffffff;
            border: 1px solid #d8b4ff;
            text-shadow: 0 0 8px #bf5eff;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 60;
            padding: 0.5rem 0.6rem;
            min-width: 54px;

<script>
(function() {
    // ==================== 機台資料庫 ====================
    const machineDatabase = [
        { id: 1, name: 'GOGO 小丑', sub: '歡樂版', ratio: '2.5', bb: 1250, rb: 620, curr: 280, total: 4200 },
        { id: 2, name: '我是小丑-EX', sub: '進化版', ratio: '2.8', bb: 1180, rb: 550, curr: 215, total: 3850 },
        { id: 3, name: '快樂小丑 VII', sub: '慶典版', ratio: '2.0', bb: 1080, rb: 510, curr: 175, total: 3550 },
        { id: 4, name: '新我是小丑-EX水晶版', sub: '限定版', ratio: '3.0', bb: 1300, rb: 650, curr: 310, total: 4500 },
        { id: 5, name: '小丑狂歡夜', sub: '派對版', ratio: '2.2', bb: 980, rb: 480, curr: 155, total: 3350 },
        { id: 6, name: '超級奇蹟小丑', sub: 'JOKER MAX', ratio: '3.5', bb: 1580, rb: 820, curr: 420, total: 5600 }
    ];
    
    const miniCardsData = [{fillCount:3,value:300},{fillCount:5,value:891},{fillCount:2,value:245},{fillCount:4,value:672},{fillCount:1,value:128},{fillCount:5,value:999},{fillCount:3,value:456},{fillCount:2,value:334}];
    const miniCardsData2 = [{fillCount:4,value:512},{fillCount:2,value:203},{fillCount:5,value:876},{fillCount:3,value:445},{fillCount:1,value:98},{fillCount:4,value:678},{fillCount:2,value:267},{fillCount:5,value:1024}];
    
    let currentSubData = null;
    let countdownIntervals = {};
    const POINT_DIFF = 0.15;
    let favorites = [];
    let reserves = [];
    let currentRawPlayed = [];
    let currentFilterDays = 31;
    let playedFiltered = [];
    
    function formatPointsDecimal(v) { 
        return v.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 }); 
    }
    function formatPointsInt(v) { 
        return Math.floor(v).toLocaleString(); 
    }
    
    function getCurrentPoints() {
        if (window.T_PACHIN_STORAGE) {
            return T_PACHIN_STORAGE.getPoints();
        }
        let saved = localStorage.getItem('t_pachin_points');
        return saved ? parseFloat(saved) : 6600;
    }
    
    function updatePointsDisplay() {
        const points = getCurrentPoints();
        const tokenBtn = document.getElementById('tokenBtn');
        const confirmPoints = document.getElementById('confirmPoints');
        const remainPoints = document.getElementById('remainPoints');
        if (tokenBtn) tokenBtn.textContent = formatPointsDecimal(points);
        if (confirmPoints) confirmPoints.textContent = formatPointsDecimal(points);
        if (remainPoints && currentSubData) remainPoints.textContent = formatPointsDecimal(points);
        if (currentSubData) updateCalc();
        localStorage.setItem('t_pachin_points', points);
    }
    
    function saveData() {
        localStorage.setItem('t_pachin_favorites', JSON.stringify(favorites));
        localStorage.setItem('t_pachin_reserves', JSON.stringify(reserves));
        localStorage.setItem('t_pachin_played', JSON.stringify(currentRawPlayed));
    }
    
    function loadData() {
        // 收藏 - 預設3台
        let savedFav = localStorage.getItem('t_pachin_favorites');
        if (savedFav && JSON.parse(savedFav).length > 0) {
            favorites = JSON.parse(savedFav);
        } else {
            favorites = [
                { ...machineDatabase[0] },
                { ...machineDatabase[2] },
                { ...machineDatabase[4] }
            ];
        }
        
        // 保留中 - 預設1台 (我是小丑-EX)
        let savedRes = localStorage.getItem('t_pachin_reserves');
        if (savedRes && JSON.parse(savedRes).length > 0) {
            reserves = JSON.parse(savedRes);
        } else {
            let reserveMachine = { ...machineDatabase[1] };
            reserveMachine.reserveTime = '10:00';
            reserveMachine.expiresAt = Date.now() + 10 * 60 * 1000;
            reserves = [reserveMachine];
        }
        
        // 玩過 - 預設4筆
        let savedPlayed = localStorage.getItem('t_pachin_played');
        if (savedPlayed && JSON.parse(savedPlayed).length > 0) {
            currentRawPlayed = JSON.parse(savedPlayed);
        } else {
            let dates = [1, 3, 7, 12, 20].map(day => {
                let dd = new Date();
                dd.setDate(dd.getDate() - day);
                return `${dd.getFullYear()}/${String(dd.getMonth()+1).padStart(2,'0')}/${String(dd.getDate()).padStart(2,'0')}`;
            });
            currentRawPlayed = machineDatabase.slice(0, 4).map((m, i) => ({ 
                ...m, 
                playCount: i + 1, 
                playedDate: dates[i] 
            }));
        }
        
        saveData();
    }
    
    function generateMiniCards(data) { 
        let html=''; 
        for(let i=0;i<data.length;i++){ 
            let bars=''; 
            for(let s=0;s<5;s++){ 
                let isRed = s >= 2; 
                let fill = s < data[i].fillCount; 
                bars += `<div class="card-bar-segment ${fill ? (isRed ? 'filled-red' : 'filled-green') : ''}"></div>`; 
            } 
            html += `<div class="mini-card"><div class="card-number">${i+1}</div><div class="card-bars">${bars}</div><div class="card-value">${data[i].value}</div></div>`; 
        } 
        return `<div class="mini-cards-row">${html}</div>`; 
    }
    
    function showToastAlert(machineName, minutesLeft) {
        let existing = document.querySelector('.alert-toast');
        if(existing) existing.remove();
        let toast = document.createElement('div');
        toast.className = 'alert-toast';
        toast.innerHTML = `⚠️ 「${machineName}」保留剩 ${minutesLeft} 分鐘到期 ⚠️`;
        document.body.appendChild(toast);
        setTimeout(() => { if(toast && toast.parentNode) toast.remove(); }, 4000);
    }
    
    function showMessage(t,m){ 
        let d=document.createElement('div'); 
        d.className='alert-popup'; 
        d.innerHTML=`<strong style="color:#ffd700;">${t}</strong> ${m}`; 
        d.style.cssText='position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:10px 20px; border-radius:30px; z-index:10001; border:1px solid #ffd700;'; 
        document.body.appendChild(d); 
        setTimeout(()=>d.remove(),2500); 
    }
    
    function createCardHTML(item, type) {
        if (!item || !item.id) return '';
        let topRow = '';
        if(type === 'reserve') {
            let displayTime = item.reserveTime || '10:00';
            topRow = `<div class="page1-reserve-row"><span class="reserve-text">⏰ 保留倒數</span><span class="time-big" id="countdown-${item.id}">${displayTime}</span></div>`;
        } else if(type === 'played') {
            topRow = `<div class="page1-played-row"><span class="played-text">玩過 ${item.playCount || 1}次</span><span class="played-date">${item.playedDate || ''}</span></div>`;
        }
        const isFav = favorites.some(f => f && f.id === item.id);
        return `<div class="flip-card ${type}-card" data-machine-id="${item.id}">
            <div class="page page-1">
                <div class="page1-row1">
                    <div class="model-name"><strong>NO.${item.id}</strong> ${item.name} <span style="color:#aac9ff;">${item.sub || ''}</span></div>
                    <span class="ratio-mini"><i class="fa fa-ticket"></i> 每枚 ${item.ratio}<span class="point-diff-badge-mini">點差 0.15</span></span>
                </div>
                ${topRow}
                <div class="stats-grid">
                    <div class="stat-cell"><div class="stat-label">BB</div><div class="stat-number bb-number">${item.bb}</div></div>
                    <div class="stat-cell"><div class="stat-label">RB</div><div class="stat-number rb-number">${item.rb}</div></div>
                    <div class="stat-cell"><div class="stat-label">當前</div><div class="stat-number curr-number">${item.curr}</div></div>
                    <div class="stat-cell"><div class="stat-label">總回</div><div class="stat-number total-number">${item.total}</div></div>
                </div>
            </div>
            <div class="page page-2 hidden">
                <div class="sub-page active">${generateMiniCards(miniCardsData)}</div>
                <div class="sub-page">${generateMiniCards(miniCardsData2)}</div>
                <div class="sub-page-indicator"><span class="sub-dot active"></span><span class="sub-dot"></span></div>
            </div>
            <div class="card-actions">
                <button class="enter-btn" onclick="window.openSubConfirm('${item.name.replace(/'/g,"\\'")}', ${item.id}, '${item.ratio}')">進入遊戲</button>
                ${type === 'reserve' ? `<button class="leave-btn" onclick="window.removeFromReserve(${item.id}, '${item.name.replace(/'/g,"\\'")}')">離開</button>` : ''}
                <button class="favorite-btn ${isFav ? 'active' : 'inactive'}" onclick="window.toggleFavorite(${item.id})"><i class="fa ${isFav ? 'fa-heart' : 'fa-heart-o'}"></i></button>
            </div>
        </div>`;
    }
    
    function updateFavoriteUI(){ 
        let c = document.getElementById('favoriteContainer'), cnt = document.getElementById('favoriteCount'), no = document.getElementById('noFavoriteMsg'); 
        cnt.textContent = favorites.length + ' 台'; 
        if(favorites.length === 0){ 
            c.innerHTML = ''; 
            no.classList.remove('hidden'); 
        } else { 
            no.classList.add('hidden'); 
            c.innerHTML = favorites.map(m => createCardHTML(m, 'favorite')).join(''); 
        } 
        bindEvents(); 
    }
    
    function updateReserveUI(){ 
        let c = document.getElementById('reserveContainer'), cnt = document.getElementById('reserveCount'), no = document.getElementById('noReserveMsg'); 
        cnt.textContent = reserves.length + ' 台'; 
        if(reserves.length === 0){ 
            c.innerHTML = ''; 
            no.classList.remove('hidden'); 
        } else { 
            no.classList.add('hidden'); 
            c.innerHTML = reserves.map(m => createCardHTML(m, 'reserve')).join(''); 
        } 
        bindEvents(); 
        startAllReserveCountdowns(); 
    }
    
    function updatePlayedUI(){ 
        let c = document.getElementById('playedContainer'), cnt = document.getElementById('playedCount'), no = document.getElementById('noPlayedMsg'); 
        cnt.textContent = playedFiltered.length + ' 台'; 
        if(playedFiltered.length === 0){ 
            c.innerHTML = ''; 
            no.classList.remove('hidden'); 
        } else { 
            no.classList.add('hidden'); 
            c.innerHTML = playedFiltered.map(m => createCardHTML(m, 'played')).join(''); 
        } 
        bindEvents(); 
    }
    
    function filterPlayedByDays(days, raw) { 
        if(!raw || !raw.length) return [];
        const start = new Date(); start.setDate(start.getDate() - days); start.setHours(0,0,0,0);
        return raw.filter(r => { 
            if(!r.playedDate) return false; 
            const parts = r.playedDate.split('/');
            if (parts.length === 3) {
                const [y,m,d] = parts;
                return new Date(parseInt(y), parseInt(m)-1, parseInt(d)) >= start;
            }
            return false;
        }).sort((a,b)=> new Date(b.playedDate) - new Date(a.playedDate));
    }
    
    function applyPlayedFilter(){ 
        playedFiltered = filterPlayedByDays(currentFilterDays, currentRawPlayed); 
        updatePlayedUI(); 
    }
    
    function startReserveCountdown(item, card, timeSpan) {
        if(!item.expiresAt) return;
        if(countdownIntervals[item.id]) clearInterval(countdownIntervals[item.id]);
        let alerted={};
        const update=()=>{
            let remain = item.expiresAt - Date.now();
            if(remain<=0){
                if(timeSpan) timeSpan.textContent='已到期';
                if(card) card.classList.add('reserve-countdown-warning');
                clearInterval(countdownIntervals[item.id]);
                reserves = reserves.filter(r => r && r.id !== item.id);
                saveData();
                updateReserveUI();
                return;
            }
            let mins = Math.floor(remain/60000), secs = Math.floor((remain%60000)/1000);
            if(timeSpan) timeSpan.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
            if(remain <= 600000){
                if(card && !card.classList.contains('reserve-countdown-warning')) card.classList.add('reserve-countdown-warning');
                let minsLeft = Math.ceil(remain/60000);
                if(!alerted[minsLeft] && minsLeft<=10 && minsLeft>0){ 
                    alerted[minsLeft]=true; 
                    showToastAlert(item.name, minsLeft); 
                }
            } else { 
                if(card && card.classList.contains('reserve-countdown-warning')) card.classList.remove('reserve-countdown-warning'); 
            }
        };
        update(); 
        countdownIntervals[item.id] = setInterval(update,1000);
    }
    
    function startAllReserveCountdowns(){ 
        Object.keys(countdownIntervals).forEach(i=>clearInterval(countdownIntervals[i])); 
        setTimeout(()=>{ 
            document.querySelectorAll('.reserve-card').forEach(card=>{ 
                let id = parseInt(card.dataset.machineId); 
                let r = reserves.find(r => r && r.id === id); 
                if(r && r.expiresAt){ 
                    let t = card.querySelector('.time-big'); 
                    startReserveCountdown(r, card, t); 
                } 
            }); 
        }, 200); 
    }
    
    function bindEvents(){ 
        document.querySelectorAll('.flip-card').forEach(card=>{ 
            card.removeEventListener('click', handleFlip); 
            card.addEventListener('click', handleFlip); 
        }); 
        document.querySelectorAll('.sub-dot').forEach(dot=>{ 
            dot.removeEventListener('click', dot._h); 
            let h=(e)=>{ 
                e.stopPropagation(); 
                let idx = Array.from(dot.parentNode.children).indexOf(dot); 
                let parent = dot.closest('.flip-card'); 
                let pages = parent.querySelectorAll('.sub-page'); 
                pages.forEach((p,i)=>i===idx?p.classList.add('active'):p.classList.remove('active')); 
                parent.querySelectorAll('.sub-dot').forEach((d,i)=>i===idx?d.classList.add('active'):d.classList.remove('active')); 
            }; 
            dot._h = h; 
            dot.addEventListener('click', h); 
        }); 
    }
    
    function handleFlip(e){ 
        if(e.target.closest('button')) return; 
        let p1 = this.querySelector('.page-1'), p2 = this.querySelector('.page-2'); 
        if(p1.classList.contains('hidden')){ 
            p2.classList.add('hidden'); 
            p1.classList.remove('hidden'); 
        } else { 
            p1.classList.add('hidden'); 
            p2.classList.remove('hidden'); 
        } 
    }
    
    window.toggleFavorite = function(id){ 
        let m = machineDatabase.find(x => x.id === id); 
        if(!m) return; 
        let idx = favorites.findIndex(f => f && f.id === id); 
        if(idx > -1) favorites.splice(idx, 1); 
        else favorites.push({ ...m }); 
        saveData();
        updateFavoriteUI(); 
    };
    
    window.removeFromReserve = function(id, name){ 
        if(confirm(`確定離開「${name}」嗎？`)){ 
            reserves = reserves.filter(r => r && r.id !== id); 
            if(countdownIntervals[id]) clearInterval(countdownIntervals[id]); 
            saveData();
            updateReserveUI(); 
        } 
    };
    
    function updateCalc(){ 
        if(!currentSubData) return; 
        let tokens = parseInt(document.getElementById('confirmTokenInput').value)||0; 
        let cost = tokens * currentSubData.ratio; 
        let waste = tokens * POINT_DIFF; 
        let total = cost + waste; 
        let currentPoints = getCurrentPoints();
        let ok = true, msg = ''; 
        if(tokens < 50){ 
            msg = '⚠️ 最低50枚'; 
            ok = false;
        } else if(total > currentPoints){ 
            msg = `❌ 點數不足 需${formatPointsDecimal(total)}`; 
            ok = false;
        } 
        document.getElementById('warningMsg').innerHTML = msg ? `<span class="text-error">${msg}</span>` : ''; 
        document.getElementById('exchangeTokens').textContent = `${tokens} 枚`; 
        document.getElementById('costPoints').textContent = formatPointsInt(cost); 
        document.getElementById('wastePoints').textContent = formatPointsInt(waste); 
        document.getElementById('remainPoints').textContent = formatPointsDecimal(currentPoints - total); 
        let btn = document.getElementById('confirmOk'); 
        if(ok){ 
            btn.classList.remove('disabled-btn'); 
            btn.style.pointerEvents = 'auto'; 
        } else { 
            btn.classList.add('disabled-btn'); 
            btn.style.pointerEvents = 'none'; 
        } 
    }
    
    function showEnhancedLoading(machineName, machineId, targetUrl = 'simulator.html') {
        const loadingDiv = document.getElementById('hologramLoading');
        const loadingTitle = document.getElementById('loadingMachineTitle');
        if (loadingTitle) loadingTitle.textContent = `${machineName} NO.${machineId}`;
        if (loadingDiv) {
            const videoElem = document.getElementById('mascotVideo');
            if (videoElem) { videoElem.load(); videoElem.muted = true; videoElem.play().catch(e => console.log("影片播放被阻止")); }
            loadingDiv.classList.add('show');
            setTimeout(() => { window.location.href = targetUrl; }, 1900);
        } else { window.location.href = targetUrl; }
    }
    
    function doEnterGame(){ 
        if(!currentSubData) return; 
        let tokens = parseInt(document.getElementById('confirmTokenInput').value)||0; 
        if(tokens < 50){ 
            showMessage('⚠️ 兌換限制','最低50枚'); 
            return; 
        } 
        let total = tokens * currentSubData.ratio + tokens * POINT_DIFF; 
        let currentPoints = getCurrentPoints();
        if(total > currentPoints){ 
            showMessage('❌ 點數不足',''); 
            return; 
        } 
        const newPoints = currentPoints - total;
        if(window.T_PACHIN_STORAGE) {
            T_PACHIN_STORAGE.updatePoints(-total);
        } else {
            localStorage.setItem('t_pachin_points', newPoints);
        }
        
        let playedRecord = {
            id: currentSubData.machineId, name: currentSubData.machineName,
            sub: machineDatabase.find(m => m.id === currentSubData.machineId)?.sub || '',
            ratio: currentSubData.ratio,
            bb: machineDatabase.find(m => m.id === currentSubData.machineId)?.bb || 0,
            rb: machineDatabase.find(m => m.id === currentSubData.machineId)?.rb || 0,
            curr: machineDatabase.find(m => m.id === currentSubData.machineId)?.curr || 0,
            total: machineDatabase.find(m => m.id === currentSubData.machineId)?.total || 0,
            playCount: 1, playedDate: new Date().toISOString().slice(0, 10).replace(/-/g, '/')
        };
        currentRawPlayed.unshift(playedRecord);
        if(currentRawPlayed.length > 50) currentRawPlayed.pop();
        saveData();
        
        updatePointsDisplay(); 
        document.getElementById('subConfirmModal').classList.remove('show'); 
        let info = { name: currentSubData.machineName, ratio: currentSubData.ratio, machineId: currentSubData.machineId, coins: tokens, pointDiff: POINT_DIFF }; 
        localStorage.setItem('t_pachin_machine_info', JSON.stringify(info)); 
        
        showEnhancedLoading(currentSubData.machineName, currentSubData.machineId);
    }
    
    window.openSubConfirm = function(name, id, ratio){ 
        currentSubData = { machineName: name, machineId: id, ratio: parseFloat(ratio) }; 
        const currentPoints = getCurrentPoints();
        document.getElementById('confirmMachineName').textContent = name; 
        document.getElementById('confirmSubName').textContent = id + '號機'; 
        document.getElementById('confirmRatio').textContent = ratio; 
        document.getElementById('pointDiffDisplay').textContent = POINT_DIFF.toFixed(2);
        document.getElementById('confirmPoints').textContent = formatPointsDecimal(currentPoints); 
        document.getElementById('remainPoints').textContent = formatPointsDecimal(currentPoints); 
        document.getElementById('confirmTokenInput').value = 100; 
        updateCalc(); 
        document.getElementById('subConfirmModal').classList.add('show'); 
    };
    
    function initAllData() {
        if(window.T_PACHIN_STORAGE){
            favorites = T_PACHIN_STORAGE.getFavorites() || [];
            reserves = T_PACHIN_STORAGE.getReserves() || [];
            currentRawPlayed = T_PACHIN_STORAGE.getPlayed() || [];
            updatePointsDisplay();
        } else {
            loadData();
        }
        updateFavoriteUI(); 
        updateReserveUI(); 
        applyPlayedFilter(); 
        startAllReserveCountdowns();
    }
    
    // 導航
    document.querySelectorAll('.nav-item, .logo, .combo-announce-btn').forEach(el => {
        el.addEventListener('click', (e) => {
            e.preventDefault();
            let page = el.dataset.page;
            if(page === 'index') location.href = 'index.html';
            else if(page === 'machines') location.href = 'machines.html';
            else if(page === 'news') location.href = 'news.html';
            else if(page === 'about') location.href = 'about.html';
        });
    });
    
    document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            let target = this.dataset.tab;
            document.querySelectorAll('.category-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(target + '-section').classList.remove('hidden');
        });
    });
    
    document.getElementById('playedDaysFilter')?.addEventListener('change', e => {
        currentFilterDays = parseInt(e.target.value);
        applyPlayedFilter();
    });
    
    document.getElementById('confirmOk')?.addEventListener('click', doEnterGame);
    document.getElementById('confirmCancelBtn')?.addEventListener('click', () => document.getElementById('subConfirmModal').classList.remove('show'));
    document.getElementById('closeXBtn')?.addEventListener('click', () => document.getElementById('subConfirmModal').classList.remove('show'));
    document.getElementById('confirmTokenInput')?.addEventListener('input', updateCalc);
    
    let savedNick = localStorage.getItem('t_pachin_nickname');
    if(savedNick) document.getElementById('nicknameDisplay').textContent = savedNick;
    else if(window.T_PACHIN_STORAGE) document.getElementById('nicknameDisplay').textContent = T_PACHIN_STORAGE.getNickname();
    
    initAllData();
    setTimeout(() => updatePointsDisplay(), 100);
})();
</script>
</body>
</html>
